<style>
body {
  margin: 0;
  background: #f3f3f3;

.laptop {

}

.section { margin-bottom: 20px; }

select, input {

  font-size: 14px; margin-right: 8px;
}

  padding: 16px; border: 1px solid #e5e7eb;
  font-size: 14px; line-height: 1.6;
  min-height: 60px; white-space: pre-wrap;
}
button {
  background: #2563eb; border: none;
  padding: 10px 18px; border-radius: 10px;
  color: #fff; cursor: pointer;
  font-size: 14px; margin-top: 6px;
}
.waitlist {
  background: #eef2ff;
  border: 1px dashed #6366f1;
  border-radius: 14px; padding: 16px;
}
.success { color: #047857; font-size: 13px; margin-top: 8px; }
.subtitles {

  background: rgba(0,0,0,0.8); color: #fff;
  padding: 12px; border-radius: 12px;

}
.disclaimer { font-size: 12px; color: #6b7280; margin-top: 6px; }
.reply-options {
  margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap;
}
.reply-options button {
  background: #f3f4f6; color: #2563eb;
  border: 1px solid #2563eb;
  padding: 6px 14px; font-size: 13px;
  border-radius: 20px; margin-top: 0; cursor: pointer;

  border: 1px solid #16a34a;
  padding: 5px 14px; border-radius: 20px;
  font-size: 12px; cursor: pointer;
  margin-top: 0; margin-right: 6px;

        <div class="card" id="teacherReply"></div>
        <div class="reply-options" id="replyOptions" style="display:none;">

          <button onclick="applyStyle('step')">2. Step-by-step</button>
          <button onclick="applyStyle('context')">3. Example</button>
        </div>
        <button id="btn-listen" onclick="speakReply()">🔊 Listen Answer</button>
      </div>

      <div class="section">
        <h4 id="label-feedback">Feedback</h4>
        <input type="text" id="feedbackInput" />
        <button id="btn-feedback" onclick="submitFeedback()">Submit</button>
        <div class="card" id="feedbackList"></div>
      </div>

      <div class="section waitlist">
        <h4 id="label-waitlist">Join BAINT Waitlist</h4>
        <input type="email" id="waitlistEmail" />
        <button id="btn-join" onclick="joinWaitlist()">Join</button>
        <div id="waitlistMessage" class="success"></div>
      </div>
    </div>
  </div>
</div>

<div class="subtitles" id="subtitles"></div>

const data = {
  en: {
    biology: {
      photosynthesis: `Alright, let's talk about photosynthesis — and I promise it's simpler than it sounds.\n\nPlants are actually making their own food, right inside their leaves. Here's how it works:\n\nFirst, the leaf soaks up sunlight like a solar panel.\nThen it pulls in carbon dioxide — that's the gas we breathe out.\nMeanwhile, the roots are drinking up water from the soil.\nNow here's the magic — a green pigment called chlorophyll takes all of that and turns it into glucose, which is basically sugar the plant uses for energy.\n\nThink of it like a recipe: sunlight + water + CO2 = food for the plant.\n\nA simple way to remember it: plants eat sunlight. That's literally what they do.\n\nDoes that make sense so far? Try asking me anything you're unsure about.`,
      cell: `Okay, cells — this is one of my favourite topics because once you get it, everything in biology starts to click.\n\nEvery single living thing — you, me, a tree, a bacteria — is made of cells. They're the smallest unit of life.\n\nNow inside a cell, you've got a few key players:\n— The nucleus is like the brain. It holds your DNA and controls what the cell does.\n— The membrane is the outer wall — it decides what comes in and what stays out.\n— The cytoplasm is the jelly-like fluid that holds everything together inside.\n\nHere's a real-life example: right now, your skin is made of billions of cells. Each one is doing its job — protecting you, repairing itself, communicating with neighbours.\n\nRemember: no cells = no life. It's that fundamental.`,
      digestion: `Let's walk through what actually happens when you eat something — say, a bowl of rice.\n\nThe moment food enters your mouth, digestion has already started. Your saliva has enzymes that begin breaking things down.\n\nThen it travels down to your stomach, which is basically a powerful acid chamber. It churns and breaks the food into a thick liquid.\n\nFrom there, it moves into your small intestine — and this is where the real magic happens. Nutrients get absorbed into your bloodstream and carried to every part of your body.\n\nWhat's left over? That gets passed to the large intestine and eventually leaves the body.\n\nSo when you eat rice, your body is basically running a full factory — breaking it down, extracting the energy, and throwing out the waste.\n\nPretty efficient system, right?`,
      genetics: `Let me explain genetics the way I wish someone had explained it to me.\n\nYou know how you might have your mum's eyes or your dad's nose? That's genetics at work.\n\nInside almost every cell in your body is DNA — think of it as a really long instruction manual. It's wound up tightly into structures called chromosomes.\n\nSmall sections of that DNA are called genes. Each gene carries instructions for a specific trait — eye colour, hair type, height, and thousands of other things.\n\nWhen your parents had you, you got half your DNA from mum and half from dad. That mix is what makes you uniquely you.\n\nSometimes one gene is stronger — we call that dominant. The weaker one is called recessive. That's why brown eyes tend to show up more than blue.\n\nGenetics is basically biology's way of passing a message down through generations.`

      algebra: `Algebra sounds scary but honestly — it's just detective work with numbers.\n\nHere's the idea: sometimes we don't know a value, so we give it a name. Usually we call it x.\n\nLet's say I tell you: x + 5 = 10.\nYou're basically asking — what number, when I add 5 to it, gives me 10?\n\nYou already know the answer is 5. You just did algebra in your head.\n\nThe formal way: subtract 5 from both sides.\nx + 5 - 5 = 10 - 5\nx = 5\n\nThe golden rule of algebra: whatever you do to one side, you must do to the other. Always keep it balanced — like a scale.\n\nOnce you get that idea, you can solve almost anything. Want to try a practice one?`,
      ratio: `A ratio is just a way of comparing two things.\n\nLet's say in a class there are 2 teachers and 10 students. The ratio of teachers to students is 2:10 — but we can simplify that to 1:5. One teacher for every five students.\n\nRatios show up everywhere — in recipes, in maps, in mixing paint, in finance.\n\nIf a recipe says mix flour and sugar in a 3:1 ratio, that means for every 3 cups of flour, you add 1 cup of sugar. Simple.\n\nTo simplify a ratio, find the biggest number that divides both sides evenly — that's called the highest common factor.\n\n2:10 → divide both by 2 → 1:5\n\nRatios are one of those things that once you see them in real life, you notice them everywhere.`
    },
    science: {
      gravity: `Let me ask you something — why does a ball fall down when you drop it, and not up?\n\nThe answer is gravity.\n\nGravity is a force — an invisible pull that every object with mass creates. The bigger the mass, the stronger the pull.\n\nEarth is massive, so its gravitational pull is strong enough to keep us on the ground, keep the moon orbiting us, and pull everything downward.\n\nIsaac Newton famously figured this out when he saw an apple fall from a tree. He asked — why does it always fall down? And that question led to one of the most important discoveries in science.\n\nOn the moon, gravity is much weaker — that's why astronauts bounce around when they walk there.\n\nGravity isn't just about falling. It's what holds our entire solar system together.`,
      energy: `Energy is one of those concepts that sounds abstract until you realise — it's literally everywhere.\n\nThe simplest definition: energy is the ability to do work. To move something, heat something, light something up.\n\nHere's what's fascinating — energy never disappears. It just changes form.\n\nWhen you eat food, chemical energy gets converted into movement energy so you can walk, run, think.\nWhen you charge your phone, electrical energy gets stored as chemical energy in the battery.\nWhen the sun shines on a solar panel, light energy becomes electrical energy.\n\nThere are many types — kinetic (movement), potential (stored), thermal (heat), electrical, chemical, nuclear.\n\nThe law of conservation of energy says energy cannot be created or destroyed — only transformed.\n\nSo every time you move, speak, or even think — you're transforming energy. Pretty remarkable.`

    history: {
      revolution: `When I say revolution, I don't just mean fighting and chaos — though that's often part of it.\n\nA revolution is what happens when a society reaches a breaking point. When enough people feel that the system is so unfair, so broken, that it has to change completely.\n\nHere's the pattern you'll see in almost every revolution:\n\nFirst, there's deep inequality or injustice — people are suffering and angry.\nThen, a spark ignites things — a bad law, a violent event, a leader who pushes too far.\nPeople organise, protest, sometimes fight.\nAnd eventually, the old power structure collapses and something new takes its place.\n\nThe French Revolution is a perfect example. The people were starving while the king lived in luxury. That tension exploded in 1789 and changed France — and honestly, the whole world — forever.\n\nRevolutions are messy, painful, and unpredictable. But they're also how history changes direction.`,
      ww1: `World War One is one of those events that starts simply and then unravels into something enormous.\n\nHere's the honest version: Europe in 1914 was like a room full of people who all hated each other and were all holding weapons.\n\nCountries had formed two big alliance systems. If one country got attacked, all its allies had to join in. It was like a chain reaction waiting to happen.\n\nThe spark? Archduke Franz Ferdinand of Austria was assassinated in Sarajevo in June 1914. Austria blamed Serbia. Russia backed Serbia. Germany backed Austria. France and Britain got pulled in.\n\nWithin weeks, most of Europe was at war.\n\nWhat followed was four years of brutal trench warfare. Millions died — soldiers and civilians alike.\n\nBy 1918 it was over, but the peace terms were so harsh on Germany that they set the stage for World War Two just twenty years later.\n\nHistory doesn't always learn from itself.`

    computer: {
      ai: `Let me explain AI the way I think about it — not with jargon, but with common sense.\n\nArtificial Intelligence is when we build systems that can do things that normally require human thinking — like recognising faces, translating languages, recommending what to watch next, or holding a conversation.\n\nBut how does it actually work?\n\nMost modern AI learns from examples. You show it millions of photos of cats, and it learns what a cat looks like. You give it billions of sentences, and it learns how language works.\n\nIt finds patterns. That's really the core of it.\n\nThe more data it gets, the better it becomes — like a student who gets smarter the more they study.\n\nAI isn't magic. It doesn't truly understand things the way humans do. But it's incredibly powerful at recognising patterns and making predictions.\n\nAnd right now, AI is changing almost every industry — medicine, education, finance, transport. We're living through one of the most significant technological shifts in human history.`,
      internet: `The internet is so normal to us now that we barely think about what it actually is.\n\nHere's the honest explanation: the internet is a massive global network of computers all connected together, able to send and receive information instantly.\n\nWhen you open a website, your device sends a request to a server somewhere in the world. That server sends back the page — and this whole conversation happens in milliseconds.\n\nThe information travels as data — broken into small packets, sent across cables and satellites, then reassembled at your end.\n\nThe World Wide Web was invented by Tim Berners-Lee in 1989. Before that, computers existed but couldn't easily talk to each other.\n\nToday, over 5 billion people use the internet. It has changed how we communicate, learn, shop, work, and understand the world.\n\nIt's probably the most transformative invention of the last 100 years.`

      photosynthesis: `好，我们来聊聊光合作用——我保证它比听起来简单得多。\n\n植物其实是在自己制造食物，就在叶片里。过程是这样的：\n\n首先，叶片像太阳能板一样吸收阳光。\n然后它吸入二氧化碳——就是我们呼出的那种气体。\n与此同时，根部从土壤中汲取水分。\n接下来见证奇迹——一种叫叶绿素的绿色物质把这些全部转化为葡萄糖，也就是植物用来获取能量的糖分。\n\n你可以把它想成一个食谱：阳光 + 水 + 二氧化碳 = 植物的食物。\n\n最简单的记法：植物"吃"阳光。就是这样。\n\n到目前为止清楚吗？有什么不明白的地方都可以问我。`,
      cell: `细胞——这是我最喜欢的话题之一，因为一旦你理解了它，生物学的很多东西就豁然开朗了。\n\n所有生物——你、我、一棵树、一个细菌——都是由细胞构成的。细胞是生命最小的单位。\n\n细胞内部有几个关键部分：\n— 细胞核就像大脑，储存DNA，控制细胞的行为。\n— 细胞膜是外墙，决定什么进来、什么出去。\n— 细胞质是里面的胶状液体，把一切固定在一起。\n\n现实例子：此刻你的皮肤就是由数十亿个细胞构成的，每一个都在默默工作。\n\n记住：没有细胞，就没有生命。就这么重要。`,
      digestion: `我们来看看当你吃东西的时候，身体里究竟发生了什么——比如吃一碗米饭。\n\n食物一进嘴，消化就开始了。唾液里有酶，开始分解食物。\n\n然后食物进入胃——胃基本上是一个强力酸性腔室，它翻腾搅动，把食物变成浓稠的液体。\n\n接着进入小肠——这里才是真正的魔法发生的地方。营养物质被吸收进血液，输送到身体各处。\n\n剩余的东西？进入大肠，最终排出体外。\n\n效率相当高，对吧？`,
      genetics: `我来用我希望当初有人告诉我的方式解释遗传学。\n\n你知道为什么你可能有妈妈的眼睛或爸爸的鼻子吗？那就是遗传在起作用。\n\n你身体里几乎每个细胞都含有DNA——把它想成一本很长的说明书。DNA紧紧缠绕形成染色体。\n\nDNA上的一小段叫做基因。每个基因携带某种特征的指令——眼睛颜色、发型、身高等等。\n\n有些基因更强势，叫显性基因；较弱的叫隐性基因。这就是为什么棕色眼睛比蓝色眼睛更常见。\n\n遗传学，就是生物学把信息代代相传的方式。`
    },
    math: {
      algebra: `代数听起来难，但说实话——它就是用数字做侦探游戏。\n\n核心思想：有时候我们不知道某个值，就给它起个名字，通常叫x。\n\n比如我告诉你：x + 5 = 10。\n你在问：什么数加上5等于10？\n\n你已经知道答案是5了。你刚才就在做代数。\n\n正式做法：两边同时减去5。\nx + 5 - 5 = 10 - 5\nx = 5\n\n代数的黄金法则：你对一边做的操作，必须对另一边也做。保持平衡——就像天平一样。`,
      ratio: `比率就是比较两样东西的方式。\n\n比如班里有2位老师和10个学生。老师和学生的比率是2:10——但我们可以化简成1:5。每5个学生对应1位老师。\n\n化简比率：找到能整除两边的最大数——这叫最大公因数。\n\n2:10 → 两边除以2 → 1:5\n\n比率就是这样，一旦在生活中发现了它，你会发现它无处不在。`
    },
    science: {
      gravity: `我问你一个问题——你扔出一个球，它为什么向下落而不是向上？\n\n答案就是重力。\n\n重力是一种力——每个有质量的物体都会产生的一种无形吸引力。质量越大，吸引力越强。\n\n地球质量巨大，所以它的引力足够强，能把我们固定在地面上，让月球围绕我们运转，并让一切向下坠落。\n\n重力不只是关于下落，它是维系整个太阳系的力量。`,
      energy: `能量这个概念听起来很抽象，直到你意识到——它其实无处不在。\n\n最简单的定义：能量是做功的能力。移动东西、加热东西、点亮东西。\n\n有趣的是——能量永远不会消失，只会改变形式。\n\n你吃东西时，化学能转化为运动能。你给手机充电时，电能储存为化学能。太阳照射太阳能板时，光能变成电能。\n\n能量守恒定律说：能量不能被创造或消灭——只能转化。`
    },
    history: {
      revolution: `当我说革命，我不只是说战斗和混乱——尽管这些往往都有。\n\n革命是当一个社会到达临界点时发生的事情。当足够多的人觉得这个制度太不公平、太腐烂，必须彻底改变。\n\n法国大革命就是完美的例子。人民在挨饿，而国王住在豪华宫殿里。这种张力在1789年爆发，永远改变了法国——说实话，也改变了整个世界。`,
      ww1: `第一次世界大战是那种开头简单、却演变成巨大灾难的事件。\n\n真实情况是：1914年的欧洲，就像一个房间里挤满了互相憎恨、人人手持武器的人。\n\n导火索？1914年6月，奥地利大公弗朗茨·斐迪南在萨拉热窝遇刺。几周之内，欧洲大部分地区陷入战争。\n\n1918年战争结束，但对德国的苛刻和约为二十年后的第二次世界大战埋下了种子。`
    },
    computer: {
      ai: `让我用我自己理解的方式解释人工智能——不用术语，用常识。\n\nAI就是我们构建能做通常需要人类思维才能完成的事情的系统——比如识别人脸、翻译语言、进行对话。\n\n大多数现代AI从例子中学习。你给它看几百万张猫的照片，它就学会了猫长什么样。它找规律。数据越多，它就越强——就像一个学得越多就越聪明的学生。`,
      internet: `互联网对我们来说已经太普通了，以至于我们几乎不去想它到底是什么。\n\n真实解释：互联网是一个巨大的全球计算机网络，所有计算机连接在一起，能够即时收发信息。\n\n当你打开一个网站，你的设备向世界某处的服务器发送一个请求。整个过程在毫秒内完成。`

  fr: {
    biology: {
      photosynthesis: `Bien, parlons de la photosynthèse — et je te promets que c'est plus simple qu'il n'y paraît.\n\nLes plantes fabriquent leur propre nourriture, directement dans leurs feuilles.\n\nD'abord, la feuille absorbe la lumière du soleil comme un panneau solaire.\nEnsuite, elle aspire du dioxyde de carbone.\nPendant ce temps, les racines absorbent l'eau du sol.\nEt voilà la magie — un pigment vert appelé chlorophylle transforme tout ça en glucose.\n\nPense à une recette : lumière + eau + CO2 = nourriture pour la plante.\n\nLa façon la plus simple de s'en souvenir : les plantes mangent la lumière du soleil.`,
      cell: `Les cellules — c'est un de mes sujets préférés.\n\nChaque être vivant — toi, moi, un arbre, une bactérie — est fait de cellules. C'est la plus petite unité de vie.\n\nÀ l'intérieur d'une cellule :\n— Le noyau, c'est comme le cerveau.\n— La membrane, c'est la paroi extérieure.\n— Le cytoplasme, c'est le liquide gélatineux qui maintient tout ensemble.\n\nRetiens bien : pas de cellules = pas de vie.`,
      digestion: `Voyons ce qui se passe vraiment quand tu manges quelque chose.\n\nDès que la nourriture entre dans ta bouche, la digestion a déjà commencé. Ta salive contient des enzymes.\n\nEnsuite, ça descend dans ton estomac — une puissante chambre acide.\n\nDe là, ça passe dans l'intestin grêle où les nutriments sont absorbés dans le sang.\n\nCe qui reste passe dans le gros intestin et finit par sortir du corps.`,
      genetics: `Laisse-moi t'expliquer la génétique simplement.\n\nTu sais comment tu peux avoir les yeux de ta mère ou le nez de ton père ? C'est la génétique.\n\nÀ l'intérieur de presque chaque cellule se trouve l'ADN — un très long manuel d'instructions enroulé en chromosomes.\n\nDe petites sections s'appellent des gènes. Chaque gène porte les instructions pour un trait spécifique.\n\nCertains gènes sont dominants, d'autres récessifs. C'est pourquoi les yeux marron apparaissent plus souvent que les yeux bleus.`

    math: {
      algebra: `L'algèbre fait peur, mais honnêtement — c'est juste du travail de détective avec des chiffres.\n\nDisons que je te dis : x + 5 = 10.\nTu connais déjà la réponse : 5.\n\nLa méthode formelle : soustraire 5 des deux côtés.\nx + 5 - 5 = 10 - 5\nx = 5\n\nLa règle d'or : ce que tu fais d'un côté, tu dois le faire de l'autre.`,

    science: {
      gravity: `Laisse-moi te poser une question — pourquoi une balle tombe-t-elle vers le bas ?\n\nLa réponse : la gravité.\n\nLa gravité est une force — une attraction invisible que crée tout objet ayant une masse.\n\nIsaac Newton a compris ça en voyant une pomme tomber d'un arbre.\n\nSur la Lune, la gravité est beaucoup plus faible — c'est pourquoi les astronautes rebondissent.`,
      energy: `L'énergie est un de ces concepts qui semble abstrait jusqu'à ce que tu réalises — elle est littéralement partout.\n\nLa définition la plus simple : l'énergie est la capacité à effectuer un travail.\n\nVoici ce qui est fascinant — l'énergie ne disparaît jamais. Elle change juste de forme.\n\nLa loi de conservation de l'énergie dit que l'énergie ne peut être ni créée ni détruite — seulement transformée.`

    history: {

      ww1: `La Première Guerre mondiale est un de ces événements qui commence simplement.\n\nL'Europe en 1914, c'était comme une pièce pleine de gens qui se détestaient tous et portaient tous des armes.\n\nL'étincelle ? L'archiduc François-Ferdinand assassiné à Sarajevo en juin 1914. En quelques semaines, la majeure partie de l'Europe était en guerre.`

  es: {
    biology: {
      photosynthesis: `Muy bien, hablemos de la fotosíntesis — y te prometo que es más sencillo de lo que parece.\n\nLas plantas fabrican su propio alimento, justo dentro de sus hojas.\n\nPrimero, la hoja absorbe la luz solar como un panel solar.\nLuego absorbe dióxido de carbono.\nMientras tanto, las raíces beben agua del suelo.\nAhora viene la magia — un pigmento verde llamado clorofila convierte todo eso en glucosa.\n\nLa forma más fácil de recordarlo: las plantas comen luz solar.`,
      cell: `Las células — este es uno de mis temas favoritos.\n\nTodo ser vivo — tú, yo, un árbol, una bacteria — está hecho de células. Son la unidad más pequeña de vida.\n\nDentro de una célula:\n— El núcleo es como el cerebro.\n— La membrana es la pared exterior.\n— El citoplasma es el líquido gelatinoso que mantiene todo junto.\n\nRecuerda: sin células = sin vida.`,
      digestion: `Veamos qué pasa realmente cuando comes algo.\n\nEn el momento en que la comida entra a tu boca, la digestión ya ha comenzado.\n\nLuego viaja al estómago — una potente cámara ácida.\n\nDe ahí pasa al intestino delgado donde los nutrientes se absorben a la sangre.\n\nEntonces cuando comes arroz, tu cuerpo está funcionando como una fábrica completa.`,
      genetics: `Déjame explicarte la genética simplemente.\n\nSabes cómo puedes tener los ojos de tu mamá o la nariz de tu papá. Eso es la genética.\n\nDentro de casi cada célula hay ADN — un manual de instrucciones muy largo enrollado en cromosomas.\n\nAlgunos genes son dominantes, otros recesivos. Por eso los ojos marrones aparecen más que los azules.`

      ratio: `Una razón es simplemente una forma de comparar dos cosas.\n\nDigamos que en una clase hay 2 profesores y 10 estudiantes. La razón es 2:10 — pero podemos simplificar a 1:5.\n\nPara simplificar, encuentra el máximo común divisor.\n\n2:10 → dividir entre 2 → 1:5`

      energy: `La energía es uno de esos conceptos que parece abstracto.\n\nLa definición más simple: la energía es la capacidad de realizar trabajo.\n\nLo fascinante es esto — la energía nunca desaparece. Solo cambia de forma.\n\nLa ley de conservación de la energía dice que la energía no puede crearse ni destruirse — solo transformarse.`

      ww1: `La Primera Guerra Mundial es uno de esos eventos que comienza simplemente.\n\nEuropa en 1914 era como una habitación llena de personas que se odiaban y todas tenían armas.\n\nLa chispa fue el asesinato del Archiduque Franz Ferdinand en junio de 1914. En pocas semanas, la mayor parte de Europa estaba en guerra.`

  th: {
    biology: {

      cell: `เซลล์คือหน่วยชีวิตที่เล็กที่สุด สิ่งมีชีวิตทุกชนิดประกอบด้วยเซลล์\n\nภายในเซลล์:\n— นิวเคลียสเปรียบเหมือนสมอง\n— เยื่อหุ้มเซลล์คือกำแพงด้านนอก\n— ไซโตพลาสซึมคือของเหลวที่รวมทุกอย่าง\n\nไม่มีเซลล์ = ไม่มีชีวิต`,
      digestion: `มาดูกันว่าอะไรเกิดขึ้นเมื่อคุณกินอาหาร\n\nทันทีที่อาหารเข้าปาก การย่อยก็เริ่ม\nกระเพาะย่อยสลายอาหารเป็นของเหลว\nลำไส้เล็กดูดซึมสารอาหารเข้าเลือด\nของเสียออกทางลำไส้ใหญ่\n\nร่างกายทำสิ่งนี้วันละ 3 ครั้งโดยอัตโนมัติ`,
      genetics: `พันธุศาสตร์อธิบายว่าทำไมคุณถึงหน้าตาคล้ายพ่อแม่\n\nภายในเซลล์มี DNA — คู่มือคำแนะนำที่ยาวมาก\nส่วนเล็กๆ ของ DNA เรียกว่ายีน\nคุณได้รับ DNA ครึ่งหนึ่งจากแม่และครึ่งหนึ่งจากพ่อ\n\nยีนเด่นจะปรากฏ ยีนด้อยจะซ่อนอยู่แต่ส่งต่อได้`

    math: {
      algebra: `พีชคณิตแค่การหาตัวเลขที่หายไป\n\nถ้า x + 5 = 10 แสดงว่า x = 5\n\nวิธีการอย่างเป็นทางการ: ลบ 5 จากทั้งสองข้าง\nx + 5 - 5 = 10 - 5\nx = 5\n\nกฎทอง: สิ่งที่ทำกับข้างหนึ่ง ต้องทำกับอีกข้างด้วย`,

    },
    science: {
      gravity: `ทำไมลูกบอลถึงตกลงเมื่อคุณปล่อยมัน?\n\nคำตอบคือแรงโน้มถ่วง\n\nแรงโน้มถ่วงเป็นแรงดึงดูดที่มองไม่เห็น ยิ่งมวลมาก แรงดึงดูดยิ่งแรง\n\nไอแซก นิวตัน ค้นพบสิ่งนี้จากแอปเปิลที่ร่วงจากต้นไม้`,
      energy: `พลังงานคือความสามารถในการทำงาน มันไม่เคยหายไป แค่เปลี่ยนรูปแบบ\n\nกินอาหาร → พลังงานเคมีเปลี่ยนเป็นพลังงานการเคลื่อนไหว\nชาร์จโทรศัพท์ → ไฟฟ้าเปลี่ยนเป็นพลังงานเคมีในแบตเตอรี่\n\nกฎการอนุรักษ์พลังงาน: พลังงานไม่สามารถสร้างหรือทำลายได้`

    zh:{biology:{photosynthesis:"光合作用详细步骤：\n\n1. 叶片通过叶绿素吸收阳光\n2. 根部从土壤中吸水\n3. 叶片通过气孔吸入CO2\n4. 叶绿素将水+CO2+光能结合\n5. 产生葡萄糖——植物的食物\n6. 释放氧气作为副产品",cell:"细胞工作原理：\n\n1. 细胞膜控制进出\n2. 细胞核通过DNA发送指令\n3. 核糖体读取指令并构建蛋白质\n4. 线粒体燃烧葡萄糖产生能量\n5. 能量驱动细胞的一切活动\n6. 时机成熟时细胞分裂",digestion:"食物在体内的旅程：\n\n1. 口腔——牙齿咀嚼，唾液开始分解\n2. 食道——食物向下传送到胃\n3. 胃——酸和酶将食物分解成液体\n4. 小肠——营养物质被吸收进血液\n5. 大肠——吸收水分，形成废物\n6. 排出——废物离开身体",genetics:"遗传特征的步骤：\n\n1. DNA存储在23对染色体中\n2. 每条染色体含有数千个基因\n3. 每个基因携带特定特征的指令\n4. 你从妈妈那获得一份，从爸爸那获得一份\n5. 如果一个是显性的，该特征就会出现\n6. 如果两个都是隐性的，隐性特征就会出现"},math:{algebra:"如何解代数方程：\n\n1. 找到未知数——通常叫x\n2. 写出完整方程：x + 5 = 10\n3. 目标：将x单独放在一边\n4. 两边同时减5\n5. 左边：x\n6. 右边：5\n7. 答案：x = 5\n8. 验证：5 + 5 = 10？是的 ✓",ratio:"如何处理比率：\n\n1. 写出两个值：2和10\n2. 表示为比率：2:10\n3. 找最大公因数：2\n4. 两边都除以2\n5. 结果：1:5\n6. 读法：每1个这种，有5个那种"},science:{gravity:"重力的工作原理：\n\n1. 每个有质量的物体都产生引力场\n2. 质量越大，引力场越强\n3. 地球质量巨大，引力场很强\n4. 地球附近的物体被拉向地心\n5. 距离越远，引力越弱\n6. 同样的力使月球绕地球运转",energy:"能量如何转化：\n\n1. 你吃食物——含有化学能\n2. 身体消化并释放该能量\n3. 肌肉将其用作动能\n4. 部分变成热能——体温\n5. 充电时：电能→化学能（储存）\n6. 开机时：化学能→电能→光和声音\n7. 每一步能量总量守恒"},history:{revolution:"革命的典型过程：\n\n1. 不平等加剧——少数人掌握权力\n2. 大多数人受苦——贫困、不公正\n3. 愤怒积累——人们开始组织抗议\n4. 导火索事件引发大规模行动\n5. 抗议升级——有时演变为武装冲突\n6. 旧政府垮台或被推翻\n7. 新的权力结构形成",ww1:"第一次世界大战的经过：\n\n1. 1914年6月28日：弗朗茨·斐迪南大公遇刺\n2. 奥匈帝国向塞尔维亚发出最后通牒\n3. 俄国为保护塞尔维亚而动员军队\n4. 德国向俄国和法国宣战\n5. 德国入侵比利时，英国向德国宣战\n6. 四年堑壕战，数百万人死亡\n7. 1918年11月：停战协议签署"},computer:{ai:"AI的学习过程：\n\n1. 收集大量数据集\n2. 将数据输入神经网络\n3. 网络对每个输入做出预测\n4. 将预测与正确答案比较\n5. 计算误差\n6. 调整网络权重以减少误差\n7. 重复数百万次\n8. 最终能对新数据做出准确预测",internet:"网页加载的步骤：\n\n1. 你在浏览器中输入网址\n2. 浏览器询问DNS该域名的IP地址\n3. DNS返回服务器IP地址\n4. 浏览器向该服务器发送HTTP请求\n5. 服务器返回HTML、CSS、JS文件\n6. 数据通过电缆和卫星传输\n7. 浏览器组装数据包并渲染页面\n8. 整个过程不到1秒"}},
    fr:{biology:{photosynthesis:"La photosynthèse étape par étape :\n\n1. La feuille absorbe la lumière solaire via la chlorophylle\n2. Les racines pompent l'eau du sol\n3. La feuille absorbe le CO2 par de minuscules pores\n4. La chlorophylle combine eau + CO2 + lumière\n5. Cela produit du glucose\n6. L'oxygène est libéré comme sous-produit",cell:"Comment une cellule fonctionne :\n\n1. La membrane cellulaire contrôle les entrées et sorties\n2. Le noyau envoie des instructions via l'ADN\n3. Les ribosomes fabriquent des protéines\n4. Les mitochondries produisent de l'énergie\n5. Cette énergie alimente la cellule\n6. La cellule se divise quand nécessaire",digestion:"Suivez la nourriture :\n\n1. Bouche — les dents mâchent, la salive commence\n2. Estomac — l'acide liquéfie la nourriture\n3. Intestin grêle — les nutriments absorbés dans le sang\n4. Gros intestin — les déchets se forment\n5. Sortie — les déchets quittent le corps",genetics:"Comment les traits sont hérités :\n\n1. Ton ADN est stocké dans 23 paires de chromosomes\n2. Chaque chromosome contient des milliers de gènes\n3. Tu as reçu une copie de ta mère et une de ton père\n4. Si l'un est dominant, ce trait apparaît\n5. Si les deux sont récessifs, le trait récessif apparaît"},math:{algebra:"Comment résoudre une équation :\n\n1. Identifier l'inconnue — x\n2. Écrire l'équation : x + 5 = 10\n3. Soustraire 5 des deux côtés\n4. Gauche : x, Droite : 5\n5. Réponse : x = 5\n6. Vérification : 5 + 5 = 10 ✓",ratio:"Comment travailler avec les ratios :\n\n1. Écrire les deux valeurs : 2 et 10\n2. Exprimer en ratio : 2:10\n3. Trouver le plus grand commun diviseur : 2\n4. Diviser les deux côtés par 2\n5. Résultat : 1:5"},science:{gravity:"Comment fonctionne la gravité :\n\n1. Tout objet ayant une masse crée un champ gravitationnel\n2. Plus la masse est grande, plus le champ est fort\n3. Tout objet proche de la Terre est attiré vers son centre\n4. Plus on est loin, plus l'attraction est faible\n5. Cette force maintient la Lune en orbite",energy:"Comment l'énergie se transforme :\n\n1. Tu manges — énergie chimique\n2. Ton corps la digère et la libère\n3. Tes muscles l'utilisent comme énergie cinétique\n4. Une partie devient chaleur corporelle\n5. Charger un téléphone : électrique → chimique\n6. L'allumer : chimique → lumière + son"},history:{revolution:"Comment une révolution se déroule :\n\n1. Les inégalités grandissent\n2. La majorité souffre\n3. La colère monte\n4. Un événement déclencheur provoque une action massive\n5. Les protestations s'intensifient\n6. L'ancien gouvernement s'effondre\n7. Une nouvelle structure de pouvoir se forme",ww1:"Comment la Première Guerre mondiale s'est déroulée :\n\n1. 28 juin 1914 : François-Ferdinand assassiné\n2. L'Autriche-Hongrie blame la Serbie\n3. La Russie se mobilise\n4. L'Allemagne déclare la guerre\n5. La Grande-Bretagne entre en guerre\n6. Quatre ans de guerre des tranchées\n7. Armistice novembre 1918"},computer:{ai:"Comment l'IA apprend :\n\n1. Collecter un énorme ensemble de données\n2. Le charger dans un réseau de neurones\n3. Le réseau fait une prédiction\n4. Comparer avec la bonne réponse\n5. Calculer l'erreur\n6. Ajuster les poids\n7. Répéter des millions de fois",internet:"Comment une page web se charge :\n\n1. Tu tapes une URL\n2. Le navigateur demande l'adresse IP au DNS\n3. Le navigateur envoie une requête HTTP\n4. Le serveur renvoie les fichiers\n5. Le navigateur assemble et affiche\n6. Durée : moins d'une seconde"}},
    es:{biology:{photosynthesis:"La fotosíntesis paso a paso:\n\n1. La hoja absorbe luz solar a través de la clorofila\n2. Las raíces extraen agua del suelo\n3. La hoja toma CO2 del aire\n4. La clorofila combina agua + CO2 + luz\n5. Produce glucosa\n6. Libera oxígeno como subproducto",cell:"Cómo funciona una célula:\n\n1. La membrana controla lo que entra y sale\n2. El núcleo envía instrucciones con ADN\n3. Los ribosomas fabrican proteínas\n4. Las mitocondrias producen energía\n5. Esa energía impulsa la célula\n6. La célula se divide cuando es necesario",digestion:"Sigue la comida:\n\n1. Boca — se mastca, la saliva inicia\n2. Estómago — el ácido licúa la comida\n3. Intestino delgado — nutrientes a la sangre\n4. Intestino grueso — se forman desechos\n5. Salida — los desechos salen del cuerpo",genetics:"Cómo se heredan los rasgos:\n\n1. Tu ADN está en 23 pares de cromosomas\n2. Cada cromosoma tiene miles de genes\n3. Recibiste una copia de mamá y otra de papá\n4. Si uno es dominante, ese rasgo aparece\n5. Si ambos son recesivos, aparece el rasgo recesivo"},math:{algebra:"Cómo resolver una ecuación:\n\n1. Identificar la incógnita — x\n2. Escribir la ecuación: x + 5 = 10\n3. Restar 5 de ambos lados\n4. Izquierda: x, Derecha: 5\n5. Respuesta: x = 5\n6. Verificación: 5 + 5 = 10 ✓",ratio:"Cómo trabajar con razones:\n\n1. Escribir los dos valores: 2 y 10\n2. Expresar como razón: 2:10\n3. Encontrar el máximo común divisor: 2\n4. Dividir ambos lados entre 2\n5. Resultado: 1:5"},science:{gravity:"Cómo funciona la gravedad:\n\n1. Todo objeto con masa crea un campo gravitacional\n2. A mayor masa, mayor campo\n3. Todo objeto cercano a la Tierra es jalado hacia su centro\n4. Más lejos = atracción más débil\n5. Esta fuerza mantiene a la Luna orbitando",energy:"Cómo se transforma la energía:\n\n1. Comes alimento — energía química\n2. Tu cuerpo la digiere y libera\n3. Tus músculos la usan como energía cinética\n4. Parte se convierte en calor corporal\n5. Cargar el teléfono: eléctrica → química\n6. Encenderlo: química → luz + sonido"},history:{revolution:"Cómo se desarrolla una revolución:\n\n1. La desigualdad crece\n2. La mayoría sufre\n3. La ira aumenta\n4. Un evento desencadenante provoca acción masiva\n5. Las protestas escalan\n6. El viejo gobierno colapsa\n7. Una nueva estructura de poder se forma",ww1:"Cómo se desarrolló la Primera Guerra Mundial:\n\n1. 28 junio 1914: asesinato de Franz Ferdinand\n2. Austria-Hungría culpa a Serbia\n3. Rusia se moviliza\n4. Alemania declara guerra\n5. Gran Bretaña entra en guerra\n6. Cuatro años de guerra de trincheras\n7. Armisticio noviembre 1918"},computer:{ai:"Cómo aprende la IA:\n\n1. Recopilar un enorme conjunto de datos\n2. Cargarlo en una red neuronal\n3. La red hace una predicción\n4. Comparar con la respuesta correcta\n5. Calcular el error\n6. Ajustar pesos\n7. Repetir millones de veces",internet:"Cómo carga una página web:\n\n1. Escribes una URL\n2. El navegador pide la IP al DNS\n3. El navegador envía solicitud HTTP\n4. El servidor devuelve archivos\n5. El navegador ensambla y muestra\n6. Tiempo total: menos de 1 segundo"}},
    th:{biology:{photosynthesis:"การสังเคราะห์แสงทีละขั้นตอน:\n\n1. ใบดูดซับแสงอาทิตย์ผ่านคลอโรฟิลล์\n2. รากดูดน้ำจากดิน\n3. ใบรับ CO2 จากอากาศ\n4. คลอโรฟิลล์รวมน้ำ+CO2+แสง\n5. ผลิตกลูโคส\n6. ปล่อยออกซิเจนออกมา",cell:"วิธีการทำงานของเซลล์:\n\n1. เยื่อหุ้มเซลล์ควบคุมสิ่งที่เข้าและออก\n2. นิวเคลียสส่งคำสั่งผ่าน DNA\n3. ไรโบโซมสร้างโปรตีน\n4. ไมโตคอนเดรียผลิตพลังงาน\n5. พลังงานขับเคลื่อนทุกอย่าง\n6. เซลล์แบ่งตัวเมื่อถึงเวลา",digestion:"ติดตามอาหารผ่านร่างกาย:\n\n1. ปาก — เคี้ยว น้ำลายย่อย\n2. กระเพาะ — กรดย่อยเป็นของเหลว\n3. ลำไส้เล็ก — ดูดซึมสารอาหารเข้าเลือด\n4. ลำไส้ใหญ่ — ดูดน้ำ ก่อตัวเป็นของเสีย\n5. ขับออก — ของเสียออกจากร่างกาย",genetics:"วิธีที่ลักษณะถูกถ่ายทอด:\n\n1. DNA เก็บไว้ใน 23 คู่โครโมโซม\n2. แต่ละโครโมโซมมียีนหลายพันตัว\n3. คุณได้รับหนึ่งชุดจากแม่และหนึ่งชุดจากพ่อ\n4. ถ้าหนึ่งเป็นยีนเด่น ลักษณะนั้นปรากฏ\n5. ถ้าทั้งคู่เป็นยีนด้อย ลักษณะด้อยปรากฏ"},math:{algebra:"วิธีแก้สมการพีชคณิต:\n\n1. ระบุค่าที่ไม่รู้จัก — x\n2. เขียนสมการ: x + 5 = 10\n3. ลบ 5 จากทั้งสองข้าง\n4. ฝั่งซ้าย: x, ฝั่งขวา: 5\n5. คำตอบ: x = 5\n6. ตรวจสอบ: 5 + 5 = 10 ✓",ratio:"วิธีทำงานกับอัตราส่วน:\n\n1. เขียนสองค่า: 2 และ 10\n2. แสดงเป็นอัตราส่วน: 2:10\n3. หา ห.ร.ม.: 2\n4. หารทั้งสองข้างด้วย 2\n5. ผลลัพธ์: 1:5"},science:{gravity:"วิธีทำงานของแรงโน้มถ่วง:\n\n1. วัตถุทุกชิ้นที่มีมวลสร้างสนามแรงโน้มถ่วง\n2. มวลยิ่งมาก สนามยิ่งแรง\n3. โลกมีมวลมหาศาล สนามแรงมาก\n4. วัตถุใกล้โลกถูกดึงเข้าหาศูนย์กลาง\n5. ยิ่งไกลยิ่งอ่อน\n6. แรงเดียวกันทำให้ดวงจันทร์โคจรรอบโลก",energy:"วิธีที่พลังงานเปลี่ยนรูป:\n\n1. กินอาหาร — มีพลังงานเคมี\n2. ร่างกายย่อยและปล่อยพลังงาน\n3. กล้ามเนื้อใช้เป็นพลังงานจลน์\n4. บางส่วนกลายเป็นความร้อน\n5. ชาร์จโทรศัพท์: ไฟฟ้า → เคมี\n6. เปิดเครื่อง: เคมี → แสงและเสียง"},history:{revolution:"วิธีที่การปฏิวัติดำเนินไป:\n\n1. ความไม่เท่าเทียมเพิ่มขึ้น\n2. คนส่วนใหญ่ทุกข์ทรมาน\n3. ความโกรธสะสม\n4. เหตุการณ์ชนวนกระตุ้นการกระทำครั้งใหญ่\n5. การประท้วงบานปลาย\n6. รัฐบาลเก่าล่มสลาย\n7. โครงสร้างอำนาจใหม่ก่อตัว",ww1:"สงครามโลกครั้งที่ 1 ดำเนินอย่างไร:\n\n1. 28 มิถุนายน 1914: อาร์คดยุคถูกลอบสังหาร\n2. ออสเตรีย-ฮังการีโทษเซอร์เบีย\n3. รัสเซียระดมกำลัง\n4. เยอรมนีประกาศสงคราม\n5. อังกฤษประกาศสงคราม\n6. สงครามสนามเพลาะสี่ปี\n7. พฤศจิกายน 1918: ลงนามสงบศึก"},computer:{ai:"AI เรียนรู้อย่างไร:\n\n1. รวบรวมชุดข้อมูลขนาดใหญ่\n2. ป้อนเข้าโครงข่ายประสาทเทียม\n3. โครงข่ายทำนายผล\n4. เปรียบเทียบกับคำตอบที่ถูกต้อง\n5. คำนวณข้อผิดพลาด\n6. ปรับค่าน้ำหนัก\n7. ทำซ้ำหลายล้านครั้ง",internet:"หน้าเว็บโหลดอย่างไร:\n\n1. พิมพ์ URL ในเบราว์เซอร์\n2. เบราว์เซอร์ถาม DNS สำหรับ IP\n3. เบราว์เซอร์ส่งคำขอ HTTP\n4. เซิร์ฟเวอร์ส่ง HTML, CSS, JS กลับมา\n5. เบราว์เซอร์ประกอบและแสดงผล\n6. เวลา: น้อยกว่า 1 วินาที"}},
    ko:{biology:{photosynthesis:"광합성 단계별 설명:\n\n1. 잎이 엽록소를 통해 햇빛을 흡수해요\n2. 뿌리가 흙에서 물을 끌어올려요\n3. 잎이 공기 중 CO2를 흡수해요\n4. 엽록소가 물+CO2+빛을 결합해요\n5. 포도당을 생산해요\n6. 부산물로 산소를 방출해요",cell:"세포가 어떻게 작동하는지:\n\n1. 세포막이 출입을 제어해요\n2. 핵이 DNA로 지시를 보내요\n3. 리보솜이 단백질을 만들어요\n4. 미토콘드리아가 에너지를 만들어요\n5. 에너지가 세포의 모든 활동을 움직여요\n6. 더 많은 세포가 필요할 때 분열해요",digestion:"음식이 몸을 통과하는 여정:\n\n1. 입 — 이가 씹고, 침이 시작\n2. 위 — 산과 효소가 액체로 만들어요\n3. 소장 — 영양분이 혈류로 흡수돼요\n4. 대장 — 폐기물이 형성돼요\n5. 출구 — 폐기물이 몸 밖으로 나가요",genetics:"형질이 유전되는 방법:\n\n1. DNA가 23쌍의 염색체에 저장돼요\n2. 각 염색체에 수천 개의 유전자가 있어요\n3. 엄마에게서 하나, 아빠에게서 하나 받았어요\n4. 우성이면 그 형질이 나타나요\n5. 둘 다 열성이면 열성 형질이 나타나요"},math:{algebra:"방정식 푸는 방법:\n\n1. 미지수 찾기 — x\n2. 방정식 쓰기: x + 5 = 10\n3. 양쪽에서 5 빼기\n4. 왼쪽: x, 오른쪽: 5\n5. 답: x = 5\n6. 확인: 5 + 5 = 10 ✓",ratio:"비율 다루는 방법:\n\n1. 비교할 두 값 쓰기: 2와 10\n2. 비율로 표현: 2:10\n3. 최대공약수 찾기: 2\n4. 양쪽을 2로 나누기\n5. 결과: 1:5"},science:{gravity:"중력이 작동하는 방법:\n\n1. 질량이 있는 모든 물체는 중력장을 만들어요\n2. 질량이 클수록 장이 강해요\n3. 지구 근처의 물체는 중심으로 당겨져요\n4. 멀수록 당김이 약해요\n5. 같은 힘이 달을 지구 궤도에 유지시켜요",energy:"에너지가 변환되는 방법:\n\n1. 음식을 먹어요 — 화학 에너지\n2. 몸이 소화시켜 에너지를 방출해요\n3. 근육이 운동 에너지로 사용해요\n4. 일부는 열에너지가 돼요\n5. 폰 충전: 전기 → 화학\n6. 켜기: 화학 → 빛 + 소리"},history:{revolution:"혁명이 전개되는 방법:\n\n1. 불평등이 커져요\n2. 다수가 고통받아요\n3. 분노가 쌓여요\n4. 촉발 사건이 대규모 행동을 일으켜요\n5. 시위가 격화돼요\n6. 구 정부가 무너지거나 전복돼요\n7. 새 권력 구조가 형성돼요",ww1:"1차 세계대전이 전개된 방법:\n\n1. 1914년 6월 28일: 사라예보에서 암살\n2. 오스트리아-헝가리가 세르비아를 비난\n3. 러시아가 세르비아 방어를 위해 동원\n4. 독일이 러시아, 프랑스에 선전포고\n5. 독일이 벨기에 침공 — 영국이 참전\n6. 4년간의 참호전\n7. 1918년 11월: 휴전 협정 체결"},computer:{ai:"AI가 학습하는 방법:\n\n1. 방대한 데이터셋 수집\n2. 신경망에 입력\n3. 네트워크가 예측 생성\n4. 정답과 비교\n5. 오류 계산\n6. 가중치 조정\n7. 수백만 번 반복",internet:"웹페이지가 로드되는 방법:\n\n1. 브라우저에 URL 입력\n2. 브라우저가 DNS에 IP 요청\n3. 브라우저가 서버에 HTTP 요청 전송\n4. 서버가 HTML, CSS, JS 파일 전송\n5. 브라우저가 조립하고 렌더링\n6. 총 시간: 1초 미만"}},
    vi:{biology:{photosynthesis:"Quang hợp từng bước:\n\n1. Lá hấp thụ ánh sáng qua chất diệp lục\n2. Rễ hút nước từ đất\n3. Lá hút CO2 từ không khí\n4. Chất diệp lục kết hợp nước+CO2+ánh sáng\n5. Tạo ra glucose\n6. Giải phóng oxy là sản phẩm phụ",cell:"Cách tế bào hoạt động:\n\n1. Màng tế bào kiểm soát vào ra\n2. Nhân gửi hướng dẫn qua DNA\n3. Ribosome tạo protein\n4. Ty thể tạo năng lượng\n5. Năng lượng vận hành mọi thứ\n6. Tế bào phân chia khi cần",digestion:"Theo dõi thức ăn qua cơ thể:\n\n1. Miệng — răng nhai, nước bọt bắt đầu\n2. Dạ dày — axit hóa lỏng thức ăn\n3. Ruột non — chất dinh dưỡng vào máu\n4. Ruột già — chất thải hình thành\n5. Thoát ra — chất thải rời khỏi cơ thể",genetics:"Cách đặc điểm được di truyền:\n\n1. DNA của bạn được lưu trong 23 cặp nhiễm sắc thể\n2. Mỗi nhiễm sắc thể có hàng nghìn gen\n3. Bạn nhận một bản từ mẹ và một từ cha\n4. Nếu một gen là trội, đặc điểm đó xuất hiện\n5. Nếu cả hai là lặn, đặc điểm lặn xuất hiện"},math:{algebra:"Cách giải phương trình:\n\n1. Xác định ẩn số — x\n2. Viết phương trình: x + 5 = 10\n3. Trừ 5 từ cả hai phía\n4. Trái: x, Phải: 5\n5. Đáp án: x = 5\n6. Kiểm tra: 5 + 5 = 10 ✓",ratio:"Cách làm việc với tỉ lệ:\n\n1. Viết hai giá trị: 2 và 10\n2. Biểu diễn dưới dạng tỉ lệ: 2:10\n3. Tìm ước chung lớn nhất: 2\n4. Chia cả hai phía cho 2\n5. Kết quả: 1:5"},science:{gravity:"Cách trọng lực hoạt động:\n\n1. Mọi vật có khối lượng đều tạo ra trường hấp dẫn\n2. Khối lượng càng lớn, trường càng mạnh\n3. Mọi vật gần Trái Đất bị kéo về tâm\n4. Càng xa, lực càng yếu\n5. Lực này giữ Mặt Trăng quỹ đạo quanh Trái Đất",energy:"Cách năng lượng biến đổi:\n\n1. Bạn ăn thức ăn — năng lượng hóa học\n2. Cơ thể tiêu hóa và giải phóng năng lượng\n3. Cơ bắp dùng làm năng lượng động học\n4. Một phần thành nhiệt năng\n5. Sạc điện thoại: điện → hóa học\n6. Bật lên: hóa học → ánh sáng + âm thanh"},history:{revolution:"Cách một cuộc cách mạng diễn ra:\n\n1. Bất bình đẳng gia tăng\n2. Đa số chịu đựng\n3. Tức giận tích tụ\n4. Sự kiện kích hoạt gây ra hành động hàng loạt\n5. Biểu tình leo thang\n6. Chính phủ cũ sụp đổ\n7. Cấu trúc quyền lực mới hình thành",ww1:"Thế chiến 1 diễn ra thế nào:\n\n1. 28/6/1914: Franz Ferdinand bị ám sát\n2. Áo-Hung đổ lỗi cho Serbia\n3. Nga động viên quân đội\n4. Đức tuyên chiến\n5. Anh tuyên chiến\n6. Bốn năm chiến tranh hào\n7. Tháng 11/1918: Ký hiệp định đình chiến"},computer:{ai:"AI học như thế nào:\n\n1. Thu thập bộ dữ liệu khổng lồ\n2. Đưa vào mạng nơ-ron\n3. Mạng dự đoán cho mỗi đầu vào\n4. So sánh với câu trả lời đúng\n5. Tính toán sai số\n6. Điều chỉnh trọng số\n7. Lặp lại hàng triệu lần",internet:"Trang web tải như thế nào:\n\n1. Bạn gõ URL vào trình duyệt\n2. Trình duyệt hỏi DNS để lấy địa chỉ IP\n3. Trình duyệt gửi yêu cầu HTTP\n4. Máy chủ gửi lại HTML, CSS, JS\n5. Trình duyệt lắp ráp và hiển thị\n6. Tổng thời gian: dưới 1 giây"}}
  };
  return s[lang]?.[subject]?.[topic] || s.en?.[subject]?.[topic] || "Let me walk through this step by step.";
}

/* ══════════════════════════════════════════
   GENERATE EXAMPLE — analogy / storytelling
══════════════════════════════════════════ */
function generateExample(lang, subject, topic){
  const s = {
    en:{biology:{photosynthesis:"Imagine a tiny green factory inside every leaf.\n\nThe factory runs on sunlight — that's its electricity. It takes in two raw materials: water piped up from the roots, and carbon dioxide drifting in from the air.\n\nInside, a worker called chlorophyll runs the production line. It manufactures glucose — sugar packets the plant uses as fuel.\n\nAs a bonus? The factory releases oxygen as exhaust. Which is lucky for us — because that's what we breathe.\n\nEvery tree you've ever seen? A solar-powered food factory, running silently every day.",cell:"Think of a cell like a tiny city.\n\nThe city wall is the membrane — it controls who gets in and out. The city hall is the nucleus — it holds all the laws (your DNA) and sends out orders.\n\nThe power plant is the mitochondria — it generates electricity (energy) to keep everything running. The factories are the ribosomes — they build things based on instructions from city hall.\n\nNow imagine billions of these tiny cities, all working together — that's your body.",digestion:"Imagine your body is a recycling plant.\n\nA truck (your mouth) arrives with raw materials (food). Workers immediately start sorting and breaking things down.\n\nThe material goes through the shredder (stomach) — powerful acid breaks everything into liquid mush.\n\nThen it moves along a long conveyor belt (small intestine). Tiny workers pull out every useful thing — proteins, fats, sugars — and load them into delivery vans (your blood) to be sent around the body.\n\nWhat's left? Waste. Compacted and removed. Your body does this 3 times a day, automatically.",genetics:"Think of DNA like a recipe book — a very, very long one.\n\nYour mum contributed half the recipes. Your dad contributed the other half. Together they make your personal cookbook.\n\nEach recipe is a gene. Some say 'brown eyes.' Some say 'tall.' Some say 'type A blood.'\n\nSometimes two recipes conflict. Mum's says blue eyes. Dad's says brown. One wins — we call it dominant. Brown beats blue.\n\nBut the losing recipe doesn't disappear. It gets passed on — and might show up in your children someday."},math:{algebra:"Imagine you're at a party and someone puts a mystery box on the table.\n\nThey say: 'If I add 5 apples to whatever's in this box, I end up with 10 apples total.'\n\nYou think for a second — there must be 5 apples in the box. You didn't need any formula. You just reasoned it out.\n\nThat's algebra. The box is x. The sentence 'box + 5 = 10' is the equation. Finding what's in the box is solving for x.\n\nThe only difference between your apple logic and algebra class is that algebra gives you formal tools to do this when the numbers get harder.",ratio:"Imagine you're making lemonade for a party.\n\nYour recipe says: for every 1 cup of lemon juice, use 4 cups of water. That's a 1:4 ratio.\n\nIf you want to make double the amount, you use 2 cups of lemon juice and 8 cups of water. The ratio stays 1:4 — the flavour stays the same.\n\nIf you mess up the ratio — say you add too much lemon — the whole batch tastes wrong. The ratio is what keeps things balanced.\n\nThis is why ratios matter in cooking, medicine, engineering, and finance."},science:{gravity:"Imagine you're standing on a giant magnet — that's basically Earth.\n\nEvery object with mass is like a tiny magnet too. And magnets pull toward each other. The bigger the magnet, the stronger the pull.\n\nEarth is so massive that its 'pull' keeps your feet on the ground, keeps the oceans from floating away, and even keeps the Moon — 384,000 km away — locked in orbit.\n\nIn space, away from large masses, you'd float. Gravity is invisible, but it's the reason the universe has any structure at all.",energy:"Think of energy like money in an economy.\n\nYou can't create money out of thin air, and you can't destroy it — it just moves around. Energy is the same.\n\nWhen you eat breakfast, you're making a deposit — your body banks chemical energy from the food. Throughout the day, you spend it: walking, talking, thinking, keeping warm.\n\nWhen your phone battery dies, the money ran out — the chemical energy was spent as light, sound, and heat.\n\nYou plug it in: the power station makes a transfer, sending electrical energy into your battery, storing it as chemical energy again."},history:{revolution:"Imagine a pressure cooker.\n\nYou keep heating it up — more pressure, more pressure. As long as the lid holds, nothing happens on the outside. But the tension inside keeps building.\n\nThen one day — a small crack. And everything explodes.\n\nThat's a revolution.\n\nThe 'heat' is injustice — years of inequality. The 'pressure' is the anger of millions who can't change things through normal channels. The 'crack' is the spark — one event that tips everything over.",ww1:"Imagine a room full of people who all hate each other — and every single one of them is holding a loaded gun.\n\nThey've also made promises: 'If anyone shoots at my friend, I'll shoot at you.' Everyone has made the same promise to someone else.\n\nNow someone fires a single shot.\n\nIn seconds, everyone in the room is shooting at everyone else — even people who had nothing to do with that first shot.\n\nThat's World War One. The single shot was the assassination of Franz Ferdinand. The promises were the European alliance systems."},computer:{ai:"Imagine teaching a child to recognise dogs.\n\nYou don't give them a rulebook. Instead, you show them thousands of pictures. 'Dog. Dog. Not a dog. Dog.'\n\nAfter enough examples, something clicks. They start recognising dogs they've never seen before — even unusual ones.\n\nThat's exactly how AI works. Instead of programming rules, you feed the system millions of examples. It finds the patterns on its own. The more examples, the better it gets.\n\nThe difference? A child learns after a few hundred. An AI might need millions — but it never gets tired or bored.",internet:"Imagine sending a letter — but the letter is cut into 1000 tiny pieces.\n\nEach piece travels separately through a different route across the world. Some go via cables under the ocean. Some bounce off satellites.\n\nAt the other end, all 1000 pieces arrive and get reassembled into the original letter. This all happens in under a second.\n\nThat's the internet. Your message, your photo, this webpage — all broken into 'packets,' sent across the world, and reassembled at the other end. Every time. Instantly."}},
    zh:{biology:{photosynthesis:"想象每片叶子里都有一个小小的绿色工厂。\n\n工厂靠阳光运行——那是它的电力。原材料是水和二氧化碳。\n\n工厂里有个叫叶绿素的工人，把这些转化成葡萄糖——植物的燃料。\n\n工厂还排放出氧气——对我们来说是好事，因为那是我们呼吸的气体。",cell:"把细胞想象成一座小城市。\n\n城墙是细胞膜，市政厅是细胞核，发电厂是线粒体，工厂是核糖体。\n\n现在想象数十亿座这样的小城市协同工作——那就是你的身体。",digestion:"想象你的身体是一个回收工厂。\n\n卡车（你的嘴）带来原材料（食物）。碎纸机（胃）分解一切。传送带（小肠）把有用的东西装进运货车（血液）。\n\n剩余物被排出体外。每天自动进行3次。",genetics:"把DNA想象成一本食谱书——一本很长的书。\n\n妈妈贡献了一半食谱，爸爸贡献另一半。每个食谱是一个基因，有的说'棕色眼睛'，有的说'高个子'。\n\n两个食谱冲突时，显性的赢。但输的食谱不消失，会传递给下一代。"},math:{algebra:"想象有人把神秘盒子放在桌上，说加5个苹果就有10个。那盒子里必定有5个。\n\n这就是代数。盒子是x，x+5=10，找出x=5。\n\n代数就是这样简单的推理，只是给了它正式的名字和工具。",ratio:"想象调柠檬水：每1杯柠檬汁加4杯水，比率1:4。\n\n做双倍时用2杯加8杯，比率不变，味道相同。\n\n比率错了，味道就不对了。这就是为什么比率在生活各处都很重要。"},science:{gravity:"想象站在巨大磁铁上——那就是地球。\n\n地球质量极大，像磁铁一样把一切拉向自己。\n\n在太空中，远离大质量天体，你会漂浮。重力是宇宙有结构的原因。",energy:"把能量想象成经济中的货币。\n\n不能凭空创造，也不能消灭，只能流动。\n\n吃早餐是存款，走路说话是消费，充电是从电站转账。每次流动都是账户间的转移。"},history:{revolution:"想象一个高压锅。不断加热，压力积累，盖子撑着没有外部变化。\n\n然后一道小裂缝，一切爆发。\n\n这就是革命：不公正是热量，愤怒是压力，一个事件是裂缝。",ww1:"想象满屋互相憎恨的人，每人都持枪，互相承诺'有人打我朋友我就打你'。\n\n然后有人开了一枪。几秒内所有人互相射击。\n\n这就是一战。那一枪是刺杀大公，那些承诺是欧洲的联盟体系。"},computer:{ai:"想象教孩子认识狗——不给规则手册，而是看数千张图片'狗、狗、不是狗'。\n\n看够了就学会了，能认出从未见过的狗。\n\nAI就这样工作：输入数百万例子，自己找规律。数据越多越好。",internet:"想象寄信，但信被剪成1000片，每片走不同路线穿越世界。\n\n到达目的地后拼回原信。不到一秒完成。\n\n这就是互联网——你的一切数据都是这样传输的。"}},
    fr:{biology:{photosynthesis:"Imagine une toute petite usine verte dans chaque feuille.\n\nL'usine fonctionne à l'énergie solaire. Elle prend l'eau des racines et le CO2 de l'air. La chlorophylle fabrique du glucose.\n\nBonus : elle rejette de l'oxygène — ce que nous respirons.",cell:"Pense à une cellule comme à une petite ville.\n\nLa muraille est la membrane, la mairie est le noyau, la centrale électrique ce sont les mitochondries, les usines sont les ribosomes.\n\nImagine des milliards de ces petites villes qui travaillent ensemble — c'est ton corps.",digestion:"Imagine que ton corps est une usine de recyclage.\n\nUn camion (ta bouche) apporte des matières premières. Le broyeur (estomac) les transforme en liquide. Le tapis roulant (intestin grêle) extrait les nutriments.\n\nLes déchets sont évacués. Ton corps fait ça 3 fois par jour.",genetics:"Pense à l'ADN comme à un livre de recettes.\n\nTa mère a contribué la moitié, ton père l'autre moitié. Chaque recette est un gène. Parfois elles se contredisent — la dominante gagne. Mais la perdante ne disparaît pas, elle se transmet.",math:{algebra:"Imagine une boîte mystérieuse. On dit: 'ajoute 5 pommes, tu en as 10.' Il y en a donc 5 dans la boîte.\n\nC'est ça l'algèbre. La boîte est x. Trouver ce qu'il y a dedans, c'est résoudre pour x.",ratio:"Imagine préparer une limonade: 1 tasse de citron pour 4 d'eau — ratio 1:4.\n\nDoubler la recette: 2 tasses + 8 tasses. Le ratio reste 1:4, le goût aussi.\n\nSi tu rates le ratio, tout est raté. C'est pourquoi les ratios sont partout."},science:{gravity:"Imagine que tu es debout sur un immense aimant — c'est la Terre.\n\nTout objet avec masse est aussi un petit aimant. La Terre attire tout vers elle.\n\nDans l'espace, tu flotterais. La gravité est ce qui donne sa structure à l'univers.",energy:"Pense à l'énergie comme à de l'argent.\n\nTu ne peux pas en créer ni en détruire — elle se déplace juste.\n\nManger c'est déposer. Marcher c'est dépenser. Charger ton téléphone c'est transférer de l'énergie électrique en chimique."},history:{revolution:"Imagine une cocotte-minute. Plus tu chauffes, plus la pression monte. Un petit crack — tout explose.\n\nC'est une révolution : l'injustice est la chaleur, la colère est la pression, l'événement déclencheur est le crack.",ww1:"Imagine une pièce pleine de gens qui se haïssent, chacun tenant un pistolet chargé et ayant promis de riposter.\n\nQuelqu'un tire un coup. En secondes tout le monde tire sur tout le monde.\n\nC'est la Première Guerre mondiale."},computer:{ai:"Imagine apprendre à un enfant à reconnaître les chiens — pas avec des règles, mais avec des milliers de photos.\n\nAprès assez d'exemples, ça clique. C'est exactement comme ça que l'IA fonctionne.",internet:"Imagine envoyer une lettre découpée en 1000 morceaux, chacun voyageant par une route différente.\n\nIls arrivent et sont réassemblés en moins d'une seconde.\n\nC'est Internet — ton message voyage ainsi à chaque fois."}},
    es:{biology:{photosynthesis:"Imagina una pequeña fábrica verde dentro de cada hoja.\n\nFunciona con luz solar. Toma agua de las raíces y CO2 del aire. La clorofila fabrica glucosa.\n\nBonus: libera oxígeno — lo que respiramos.",cell:"Piensa en una célula como en una pequeña ciudad.\n\nLa membrana es la muralla, el núcleo es el ayuntamiento, las mitocondrias son la planta eléctrica, los ribosomas son las fábricas.\n\nImagina miles de millones de estas pequeñas ciudades trabajando juntas — eso es tu cuerpo.",digestion:"Imagina que tu cuerpo es una planta de reciclaje.\n\nUn camión (tu boca) trae materias primas. La trituradora (estómago) las convierte en líquido. La banda transportadora (intestino) extrae los nutrientes.\n\nLos desechos son eliminados. Tu cuerpo hace esto 3 veces al día.",genetics:"Piensa en el ADN como en un libro de recetas.\n\nMamá aportó la mitad, papá la otra mitad. Cada receta es un gen. A veces se contradicen — la dominante gana. Pero la perdedora no desaparece, se transmite.",math:{algebra:"Imagina una caja misteriosa. Dicen: 'agrega 5 manzanas y tendrás 10.' Entonces hay 5 en la caja.\n\nEso es el álgebra. La caja es x. Encontrar lo que hay dentro es resolver para x.",ratio:"Imagina preparar limonada: 1 taza de limón por 4 de agua — razón 1:4.\n\nDoblar la receta: 2 tazas + 8 tazas. La razón se mantiene 1:4, el sabor también.\n\nSi fallas la razón, todo falla. Por eso las razones importan en todas partes."},science:{gravity:"Imagina que estás parado sobre un imán gigante — eso es la Tierra.\n\nTodo objeto con masa también es un imán. La Tierra atrae todo hacia ella.\n\nEn el espacio flotarías. La gravedad es lo que da estructura al universo.",energy:"Piensa en la energía como en dinero.\n\nNo puedes crearla ni destruirla — solo se mueve.\n\nComer es depositar. Caminar es gastar. Cargar el teléfono es transferir energía eléctrica a química."},history:{revolution:"Imagina una olla a presión. Más calor, más presión. Una grieta pequeña — todo explota.\n\nEso es una revolución: la injusticia es el calor, la ira es la presión, el evento es la grieta.",ww1:"Imagina una habitación llena de personas que se odian, cada una con un arma cargada y habiendo prometido responder si atacan a su amigo.\n\nAlguien dispara. En segundos todos disparan contra todos.\n\nEso es la Primera Guerra Mundial."},computer:{ai:"Imagina enseñarle a un niño a reconocer perros — no con reglas sino con miles de fotos.\n\nDespués de suficientes ejemplos, algo hace clic. Así funciona la IA exactamente.",internet:"Imagina enviar una carta cortada en 1000 pedazos, cada uno viajando por una ruta diferente.\n\nLlegan y se reensamblan en menos de un segundo.\n\nEso es Internet — así viaja tu información cada vez."}},
    th:{biology:{photosynthesis:"ลองนึกภาพโรงงานสีเขียวเล็กๆ ภายในใบพืชทุกใบ\n\nโรงงานทำงานด้วยแสงอาทิตย์ รับน้ำจากรากและ CO2 จากอากาศ คลอโรฟิลล์ผลิตกลูโคส\n\nของแถม: โรงงานปล่อยออกซิเจน — สิ่งที่เราหายใจ",cell:"คิดว่าเซลล์เหมือนเมืองเล็กๆ\n\nกำแพงคือเยื่อหุ้ม ศาลากลางคือนิวเคลียส โรงไฟฟ้าคือไมโตคอนเดรีย โรงงานคือไรโบโซม\n\nนึกภาพเมืองหลายพันล้านเมืองทำงานร่วมกัน — นั่นคือร่างกายของคุณ",digestion:"ลองนึกภาพร่างกายเป็นโรงงานรีไซเคิล\n\nรถบรรทุก (ปาก) นำวัตถุดิบมา เครื่องบด (กระเพาะ) แปลงเป็นของเหลว สายพาน (ลำไส้) ดึงสารอาหารออก\n\nของเสียถูกกำจัดออก ร่างกายทำสิ่งนี้วันละ 3 ครั้ง",genetics:"คิดว่า DNA เหมือนหนังสือตำราอาหาร\n\nแม่มีส่วนร่วมสูตรครึ่งหนึ่ง พ่อมีส่วนร่วมอีกครึ่ง แต่ละสูตรคือยีน เมื่อขัดแย้งกัน ยีนเด่นจะชนะ แต่ยีนที่แพ้ไม่หายไป — มันส่งต่อไป",math:{algebra:"ลองนึกภาพกล่องลึกลับที่มีของบางอย่างอยู่ มีคนบอกว่า 'เพิ่ม 5 ชิ้นจะได้ 10 ชิ้น' ดังนั้นในกล่องมี 5 ชิ้น\n\นั่นคือพีชคณิต กล่องคือ x หาค่า x = 5",ratio:"ลองนึกภาพทำน้ำมะนาว: มะนาว 1 ถ้วย น้ำ 4 ถ้วย — อัตราส่วน 1:4\n\nทำสองเท่า: 2 ถ้วย + 8 ถ้วย อัตราส่วนยังคงเป็น 1:4 รสชาติเหมือนเดิม\n\nอัตราส่วนผิด รสชาติผิด นั่นคือทำไมอัตราส่วนสำคัญ"},science:{gravity:"ลองนึกภาพยืนอยู่บนแม่เหล็กยักษ์ — นั่นคือโลก\n\nโลกมีขนาดใหญ่มากจนดึงทุกอย่างเข้าหา\n\nในอวกาศ คุณจะลอย แรงโน้มถ่วงคือสิ่งที่ให้โครงสร้างกับจักรวาล",energy:"คิดว่าพลังงานเหมือนเงินในระบบเศรษฐกิจ\n\nไม่สามารถสร้างหรือทำลายได้ แค่เคลื่อนย้ายไปมา\n\nกินอาหารคือฝากเงิน เดินคือใช้จ่าย ชาร์จโทรศัพท์คือโอนเงินจากโรงไฟฟ้า"},history:{revolution:"ลองนึกภาพหม้อแรงดัน ยิ่งให้ความร้อนยิ่งมีแรงดัน รอยแตกเล็กๆ แล้วทุกอย่างระเบิด\n\nนั่นคือการปฏิวัติ: ความอยุติธรรมคือความร้อน ความโกรธคือแรงดัน เหตุการณ์คือรอยแตก",ww1:"ลองนึกภาพห้องที่เต็มไปด้วยคนที่เกลียดชังกัน ทุกคนถืออาวุธและให้คำสัญญา 'ถ้าใครยิงเพื่อนฉัน ฉันจะยิงคุณ'\n\nมีคนยิงกระสุนเดียว ในไม่กี่วินาทีทุกคนก็ยิงใส่กัน — นั่นคือสงครามโลกครั้งที่หนึ่ง"},computer:{ai:"ลองนึกภาพสอนเด็กให้จำสุนัขได้ — ไม่ใช้กฎ แต่ดูรูปภาพนับพัน 'สุนัข สุนัข ไม่ใช่สุนัข'\n\nหลังจากตัวอย่างมากพอ สิ่งต่างๆ ก็คลิก นั่นคือวิธีที่ AI ทำงาน",internet:"ลองนึกภาพส่งจดหมายที่ถูกตัดเป็น 1000 ชิ้น แต่ละชิ้นเดินทางผ่านเส้นทางต่างกัน\n\nถึงปลายทางแล้วประกอบกลับในเวลาไม่ถึงวินาที — นั่นคืออินเทอร์เน็ต"}},
    ko:{biology:{photosynthesis:"모든 잎사귀 안에 작은 초록색 공장이 있다고 상상해보세요.\n\n공장은 햇빛으로 돌아가요. 뿌리에서 물을, 공기에서 CO2를 가져와요. 엽록소가 포도당을 만들어요.\n\n보너스? 산소를 배출해요 — 우리가 숨 쉬는 바로 그거예요.",cell:"세포를 작은 도시라고 생각해보세요.\n\n막이 도시 벽, 핵이 시청, 미토콘드리아가 발전소, 리보솜이 공장이에요.\n\n이런 작은 도시 수십억 개가 함께 작동한다고 상상해보세요 — 그게 당신의 몸이에요.",digestion:"당신의 몸이 재활용 공장이라고 상상해보세요.\n\n트럭(입)이 원자재(음식)를 가져와요. 분쇄기(위)가 액체로 만들어요. 컨베이어 벨트(소장)가 영양분을 추출해요.\n\n폐기물은 제거돼요. 하루 3번 자동으로요.",genetics:"DNA를 요리책이라고 생각해보세요.\n\n엄마가 절반, 아빠가 나머지 절반을 기여했어요. 각 레시피가 유전자예요. 충돌할 때 우성이 이겨요. 지는 레시피는 사라지지 않고 전달돼요.",math:{algebra:"파티에서 신비한 상자가 테이블에 놓여요. '5개를 더하면 10개가 돼요.' 그럼 상자 안에 5개가 있어야 해요.\n\n그게 대수학이에요. 상자가 x예요. x 찾기가 대수학이에요.",ratio:"파티를 위해 레모네이드를 만들어요: 레몬즙 1컵에 물 4컵 — 1:4 비율.\n\n두 배를 만들면 2컵 + 8컵. 비율은 1:4 유지돼요 — 맛이 같아요.\n\n비율을 실수하면 모든 것이 잘못돼요. 그래서 비율이 중요해요."},science:{gravity:"거대한 자석 위에 서 있다고 상상해보세요 — 그게 지구예요.\n\n지구는 너무 거대해서 모든 것을 끌어당겨요.\n\n우주에서는 떠다닐 거예요. 중력은 우주에 구조가 있는 이유예요.",energy:"에너지를 경제의 돈이라고 생각해보세요.\n\n만들거나 파괴할 수 없어요 — 그냥 이동해요.\n\n아침 먹기가 예금, 걷기가 지출, 폰 충전이 발전소에서 배터리로 이체예요."},history:{revolution:"압력솥을 상상해보세요. 가열할수록 압력이 쌓여요. 작은 균열 하나 — 그리고 모든 것이 폭발해요.\n\n그게 혁명이에요: 불의가 열, 분노가 압력, 사건이 균열이에요.",ww1:"서로를 모두 미워하는 사람들로 가득 찬 방을 상상해보세요. 모두 총을 들고 '내 친구를 쏘면 나도 쏠게'라고 약속했어요.\n\n누군가 한 발을 쏴요. 몇 초 안에 모든 사람이 모든 사람에게 쏴요 — 그게 1차 세계대전이에요."},computer:{ai:"아이에게 개를 알아보도록 가르친다고 상상해보세요 — 규칙이 아니라 수천 장의 사진으로요.\n\n충분한 예시 후 뭔가가 클릭돼요. 그게 정확히 AI가 작동하는 방식이에요.",internet:"편지를 1000개의 작은 조각으로 잘라 보낸다고 상상해보세요. 각 조각이 다른 경로로 여행해요.\n\n반대쪽에서 조립돼요 — 1초 이내에요. 그게 인터넷이에요."}},
    vi:{biology:{photosynthesis:"Hãy tưởng tượng một nhà máy màu xanh nhỏ bên trong mỗi chiếc lá.\n\nNhà máy chạy bằng ánh sáng mặt trời. Lấy nước từ rễ và CO2 từ không khí. Chất diệp lục sản xuất glucose.\n\nBonus: thải ra oxy — thứ chúng ta thở.",cell:"Hãy nghĩ tế bào như một thành phố nhỏ.\n\nMàng là tường thành, nhân là tòa thị chính, ty thể là nhà máy điện, ribosome là các nhà máy.\n\nHãy tưởng tượng hàng tỷ thành phố nhỏ cùng làm việc — đó là cơ thể bạn.",digestion:"Hãy tưởng tượng cơ thể bạn là nhà máy tái chế.\n\nXe tải (miệng) mang nguyên liệu. Máy nghiền (dạ dày) tạo thành bột nhão. Băng tải (ruột non) lấy ra chất dinh dưỡng.\n\nChất thải được loại bỏ. Cơ thể làm điều này 3 lần mỗi ngày.",genetics:"Hãy nghĩ DNA như một cuốn sách dạy nấu ăn.\n\nMẹ đóng góp một nửa công thức, cha nửa còn lại. Mỗi công thức là một gen. Khi xung đột, gen trội thắng. Gen thua không biến mất — nó được truyền đi.",math:{algebra:"Hãy tưởng tượng một hộp bí ẩn. Ai đó nói: 'thêm 5 cái sẽ có 10 cái.' Vậy trong hộp có 5 cái.\n\nĐó là đại số. Hộp là x. Tìm ra trong hộp có gì là giải tìm x.",ratio:"Hãy tưởng tượng pha nước chanh: 1 cốc nước cốt chanh với 4 cốc nước — tỉ lệ 1:4.\n\nLàm gấp đôi: 2 cốc + 8 cốc. Tỉ lệ vẫn 1:4 — vị vẫn như vậy.\n\nNếu làm sai tỉ lệ, mọi thứ sẽ sai. Đó là lý do tỉ lệ quan trọng."},science:{gravity:"Hãy tưởng tượng đứng trên một nam châm khổng lồ — đó là Trái Đất.\n\nTrái Đất khổng lồ đến mức kéo mọi thứ về phía nó.\n\nTrong không gian bạn sẽ lơ lửng. Trọng lực là lý do vũ trụ có cấu trúc.",energy:"Hãy nghĩ năng lượng như tiền trong nền kinh tế.\n\nBạn không thể tạo ra hay tiêu hủy nó — nó chỉ di chuyển.\n\nĂn sáng là gửi tiền. Đi bộ là chi tiêu. Sạc điện thoại là chuyển khoản từ nhà máy điện."},history:{revolution:"Hãy tưởng tượng một nồi áp suất. Càng đun nóng càng nhiều áp suất. Một vết nứt nhỏ — mọi thứ phát nổ.\n\nĐó là cách mạng: bất công là nhiệt, tức giận là áp suất, sự kiện là vết nứt.",ww1:"Hãy tưởng tượng căn phòng đầy người ghét nhau, tất cả cầm súng và hứa 'nếu ai bắn bạn tôi, tôi sẽ bắn anh'.\n\nAi đó bắn một phát. Trong vài giây mọi người bắn vào mọi người — đó là Thế chiến thứ nhất."},computer:{ai:"Hãy tưởng tượng dạy một đứa trẻ nhận biết chó — không phải bằng quy tắc mà bằng hàng nghìn bức ảnh.\n\nSau đủ ví dụ, có gì đó bật ra. Đó chính xác là cách AI hoạt động.",internet:"Hãy tưởng tượng gửi một bức thư được cắt thành 1000 mảnh, mỗi mảnh đi theo một tuyến đường khác nhau.\n\nChúng đến và được lắp ráp lại trong vòng chưa đầy một giây — đó là Internet."}}
  };
  return s[lang]?.[subject]?.[topic] || s.en?.[subject]?.[topic] || "Here's a real-world way to think about this.";
}

/* ══════════════════════════════════════════
   BOOT & LAUNCH
══════════════════════════════════════════ */
function launchDemo(){
  // Get elements fresh each time — fixes timing issues
  const appLauncher = document.getElementById("app-launcher");
  const bootScreen  = document.getElementById("boot");
  const demoScreen  = document.getElementById("demo");
  const bootLog     = document.getElementById("boot-log");

  if(!appLauncher || !bootScreen || !demoScreen || !bootLog){
    alert("Demo failed to load. Please refresh the page.");
    return;
  }

  appLauncher.style.display = "none";
  bootScreen.style.display  = "block";
  bootLog.innerHTML = "";

  const lang  = document.getElementById("language") 
                ? document.getElementById("language").value 
                : "en";
  const lines = (ui[lang] || ui.en).boot;
  let i = 0;

  function run(){
    if(i < lines.length){
      bootLog.innerHTML += lines[i] + "<br>";
      i++;
      setTimeout(run, 500);
    } else {
      setTimeout(() => {
        bootScreen.style.display = "none";
        demoScreen.style.display = "block";
        switchLanguage();
      }, 500);
    }
  }
  run();
     }



/* ── SWITCH LANGUAGE ── */
function switchLanguage(){
  const lang = document.getElementById("language").value;
  const t    = ui[lang];
  document.getElementById("label-setup").innerText     = t.setup;
  document.getElementById("label-assistant").innerText = t.assistant;
  document.getElementById("label-feedback").innerText  = t.feedback;
  document.getElementById("label-waitlist").innerText  = t.waitlist;
  document.getElementById("btn-speak").innerText       = t.speak;
  document.getElementById("btn-stop").innerText        = t.stop;
  document.getElementById("btn-ask").innerText         = t.ask;
  document.getElementById("btn-listen").innerText      = t.listen;
  document.getElementById("btn-feedback").innerText    = t.submit;
  document.getElementById("btn-join").innerText        = t.join;
  document.getElementById("studentQuestion").placeholder = t.placeholder;
  document.getElementById("teacherReply").innerText    = t.replyDefault;
  const modeEl = document.getElementById("mode");
  ["step","simple","logic","context","human"].forEach((v,i) => { modeEl.options[i].text = t.modes[i]; });
  const subjectEl = document.getElementById("subject");
  ["biology","history","science","math","computer"].forEach((v,i) => { subjectEl.options[i].text = t.subjects[i]; });
  updateTopics();
  updateContent();
}

/* ── TOPICS ── */
function updateTopics(){
  const lang    = document.getElementById("language").value;
  const subject = document.getElementById("subject").value;
  const topicEl = document.getElementById("topic");
  topicEl.innerHTML = "";
  const keys = Object.keys(data[lang]?.[subject] || data.en[subject] || {});
  keys.forEach(k => {
    const opt = document.createElement("option");
    opt.value    = k;
    opt.innerText = k.charAt(0).toUpperCase() + k.slice(1);
    topicEl.appendChild(opt);
  });
  topicEl.value = keys[0];
}

/* ── CONTENT — picks correct generator per mode ── */
function updateContent(){
  const lang    = document.getElementById("language").value;
  const subject = document.getElementById("subject").value;
  const topic   = document.getElementById("topic").value;
  const mode    = document.getElementById("mode").value;
  if(!data[lang]?.[subject]?.[topic] && !data.en?.[subject]?.[topic]) return;

  let output = "";
  if(mode === "simple"){
    output = generateSimple(lang, subject, topic);
  } else if(mode === "step"){
    output = generateStepByStep(lang, subject, topic);
  } else if(mode === "context"){
    output = generateExample(lang, subject, topic);
  } else {
    // logic / human — use full teacher content
    output = data[lang]?.[subject]?.[topic] || data.en[subject][topic];
  }
  document.getElementById("explanation").innerText = output;
}

/* ── VOICE (upgraded) ── */
let utterance;

function getBestVoice(langCode){
  const voices = speechSynthesis.getVoices();
  const prefixMap = {
    en:["en-GB","en-AU","en-US"],
    zh:["zh-TW","zh-HK","zh-CN"],
    fr:["fr-FR","fr-BE","fr-CA"],
    es:["es-ES","es-MX","es-US"],
    th:["th-TH","th"],
    ko:["ko-KR","ko"],
    vi:["vi-VN","vi"]
  };
  const preferred = prefixMap[langCode] || ["en-US"];
  for(const locale of preferred){
    const match = voices.find(v => v.lang === locale);
    if(match) return match;
  }
  const fallback = voices.find(v => v.lang.toLowerCase().startsWith(langCode));
  if(fallback) return fallback;
  return voices.find(v => v.lang.startsWith("en")) || voices[0];
}

function speak(){
  stopVoice();
  const lang = document.getElementById("language").value;
  const text = document.getElementById("explanation").innerText;
  if(!text) return;
  document.getElementById("subtitles").style.display = "block";
  document.getElementById("subtitles").innerText = text;
  utterance = new SpeechSynthesisUtterance(text);
  utterance.voice  = getBestVoice(lang);
  utterance.lang   = utterance.voice ? utterance.voice.lang : lang;
  utterance.rate   = 0.92;
  utterance.pitch  = 1.05;
  utterance.volume = 1;
  utterance.onend  = () => { document.getElementById("subtitles").style.display = "none"; };
  speechSynthesis.speak(utterance);
}

function speakReply(){
  stopVoice();
  const lang = document.getElementById("language").value;
  const text = document.getElementById("teacherReply").innerText;
  if(!text) return;
  document.getElementById("subtitles").style.display = "block";
  document.getElementById("subtitles").innerText = text;
  utterance = new SpeechSynthesisUtterance(text);
  utterance.voice  = getBestVoice(lang);
  utterance.lang   = utterance.voice ? utterance.voice.lang : lang;
  utterance.rate   = 0.92;
  utterance.pitch  = 1.05;
  utterance.volume = 1;
  utterance.onend  = () => { document.getElementById("subtitles").style.display = "none"; };
  speechSynthesis.speak(utterance);
}

function stopVoice(){
  speechSynthesis.cancel();
  document.getElementById("subtitles").style.display = "none";
}

speechSynthesis.onvoiceschanged = () => { speechSynthesis.getVoices(); };

/* ── STATE DETECTION ── */
function detectUserState(input){
  const t = input.toLowerCase().trim();
  if(/don'?t understand|confused|not clear|lost|unclear|what does|what is|help/.test(t)) return "confused";
  if(/how|why|tell me more|explain more|what about|curious|interesting|deeper/.test(t)) return "curious";
  return "neutral";
}

/* ── ANSWER QUESTION — no labels, natural teacher language ── */
function answerQuestion(){
  const lang  = document.getElementById("language").value;
  const q     = document.getElementById("studentQuestion").value.trim();
  const s     = document.getElementById("subject").value;
  const t     = document.getElementById("topic").value;
  if(!q) return;

  const state = detectUserState(q);
  let reply   = "";

  if(state === "confused"){
    reply = "No worries — let me make this really simple.\n\n"
      + generateSimple(lang, s, t)
      + "\n\nDoes that help? Or would you like me to try a different approach?";
  } else if(state === "curious"){
    reply = "Great question! Let me give you a deeper look.\n\n"
      + generateStepByStep(lang, s, t);
  } else {
    reply = "Let me walk you through this.\n\n"
      + (data[lang]?.[s]?.[t] || data.en[s][t]);
  }

  document.getElementById("teacherReply").innerHTML = reply.replace(/\n/g,"<br>");
  document.getElementById("replyOptions").style.display = "flex";
}

/* ── APPLY STYLE — each button gives genuinely different output ── */
function applyStyle(style){
  const lang = document.getElementById("language").value;
  const s    = document.getElementById("subject").value;
  const t    = document.getElementById("topic").value;
  const T    = ui[lang];
  let reply  = "";

  if(style === "simple"){
    reply = generateSimple(lang, s, t);
  } else if(style === "step"){
    reply = generateStepByStep(lang, s, t);
  } else if(style === "context"){
    reply = generateExample(lang, s, t);
  }

  document.getElementById("teacherReply").innerHTML =
    reply.replace(/\n/g,"<br>") +
    `<br><br><span style="color:#6b7280;font-size:13px;">${T.clarify}</span><br>
    <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;">
      <button class="followup-btn" onclick="gotIt()">${T.yes}</button>
      <button class="followup-btn alt" onclick="showOptions()">${T.tryAgain}</button>
    </div>`;
}

function gotIt(){
  const lang = document.getElementById("language").value;
  const el   = document.getElementById("teacherReply");
  const text = el.innerText.split(ui[lang].clarify)[0].trim();
  el.innerHTML = text.replace(/\n/g,"<br>");
  document.getElementById("replyOptions").style.display = "none";
}

function showOptions(){
  document.getElementById("replyOptions").style.display = "flex";
  document.getElementById("replyOptions").scrollIntoView({behavior:"smooth"});
}

/* ── FEEDBACK ── */
function submitFeedback(){
  const f    = document.getElementById("feedbackInput").value;
  let list   = JSON.parse(localStorage.getItem("baint_feedback")) || [];
  list.push(f);
  localStorage.setItem("baint_feedback", JSON.stringify(list));
  document.getElementById("feedbackList").innerHTML = list.map(x => "• " + x).join("<br>");
}

/* ── WAITLIST ── */
function joinWaitlist(){
  const lang  = document.getElementById("language").value;
  const email = document.getElementById("waitlistEmail").value;
  let list    = JSON.parse(localStorage.getItem("baint_waitlist")) || [];
  list.push(email);
  localStorage.setItem("baint_waitlist", JSON.stringify(list));
  window.location.href = `mailto:baintcomputer@gmail.com?subject=BAINT Waitlist&body=New signup: ${email}`;
  document.getElementById("waitlistMessage").innerText = ui[lang].waitlistOk;
}
