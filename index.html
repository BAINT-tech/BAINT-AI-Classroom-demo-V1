<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BAINT OS – Classroom Assistant Demo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: #f3f3f3;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.laptop {
  width: 960px;
  height: 650px;
  background: #000;
  border-radius: 28px;
  padding: 16px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  display: flex;
  flex-direction: column;
}

.top-bar {
  height: 36px;
  background: #1c1c1c;
  border-radius: 18px 18px 0 0;
  color: #fff;
  display: flex;
  align-items: center;
  padding: 0 16px;
  font-size: 14px;
  font-weight: bold;
}

.screen-shell {
  flex: 1;
  background: #f9fafb;
  border-radius: 0 0 28px 28px;
  margin-top: 6px;
  padding: 22px;
  overflow-y: auto;
}

.section { margin-bottom: 20px; }
.section h4 { margin: 0 0 8px; font-size: 15px; }

select, input {
  padding: 8px 10px;
  border-radius: 8px;
  border: 1px solid #d1d5db;
  font-size: 14px;
  margin-right: 8px;
}

input[type="text"], input[type="email"] { width: 60%; }

.card {
  background: #fff;
  border-radius: 14px;
  padding: 16px;
  border: 1px solid #e5e7eb;
  font-size: 14px;
  line-height: 1.6;
  min-height: 60px;
  white-space: pre-wrap;
}

button {
  background: #2563eb;
  border: none;
  padding: 10px 18px;
  border-radius: 10px;
  color: #fff;
  cursor: pointer;
  font-size: 14px;
  margin-top: 6px;
}

.waitlist {
  background: #eef2ff;
  border: 1px dashed #6366f1;
  border-radius: 14px;
  padding: 16px;
}

.success { color: #047857; font-size: 13px; margin-top: 8px; }

.subtitles {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 80%;
  background: rgba(0,0,0,0.8);
  color: #fff;
  padding: 12px;
  border-radius: 12px;
  font-size: 13px;
  display: none;
  text-align: center;
}

.disclaimer { font-size: 12px; color: #6b7280; margin-top: 6px; }

/* Response option buttons */
.reply-options {
  margin-top: 10px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.reply-options button {
  background: #f3f4f6;
  color: #2563eb;
  border: 1px solid #2563eb;
  padding: 6px 14px;
  font-size: 13px;
  border-radius: 20px;
  margin-top: 0;
  cursor: pointer;
}
.reply-options button:hover { background: #2563eb; color: #fff; }

/* Was this clearer? follow-up buttons */
.followup-btn {
  background: #f0fdf4;
  color: #16a34a;
  border: 1px solid #16a34a;
  padding: 5px 14px;
  border-radius: 20px;
  font-size: 12px;
  cursor: pointer;
  margin-top: 0;
  margin-right: 6px;
}
.followup-btn.alt {
  background: #f3f4f6;
  color: #2563eb;
  border-color: #2563eb;
}
</style>
</head>

<body>

<div class="laptop">
  <div class="top-bar">BAINT OS — Classroom Assistant Demo</div>
  <div class="screen-shell">

    <!-- LAUNCH -->
    <div id="app-launcher" class="section">

      <div class="disclaimer">Demo partially AI-assisted for guidance. Human supervision encouraged.</div>

    <!-- BOOT -->

      <div style="background:#111;color:#0f0;font-family:monospace;padding:20px;">
        <div id="boot-log"></div>
      </div>
    </div>

    <!-- DEMO -->
    <div id="demo" style="display:none;">

      <div class="section">
        <h4 id="label-setup">Learning Setup</h4>

        <select id="language" onchange="switchLanguage()">
          <option value="en">🇺🇸 English</option>
          <option value="zh">🇨🇳 Chinese</option>
          <option value="fr">🇫🇷 French</option>
          <option value="es">🇪🇸 Spanish</option>
          <option value="th">🇹🇭 Thai</option>
          <option value="ko">🇰🇷 Korean</option>
          <option value="vi">🇻🇳 Vietnamese</option>
        </select>

        <select id="mode" onchange="updateContent()">
          <option value="step">Step-by-step</option>
          <option value="simple">Simple</option>
          <option value="logic">Logical</option>
          <option value="context">Context</option>
          <option value="human">Human</option>
        </select>

        <select id="subject" onchange="updateTopics(); updateContent();">
          <option value="biology">Biology</option>
          <option value="history">History</option>
          <option value="science">Science</option>
          <option value="math">Mathematics</option>
          <option value="computer">Computer Science</option>
        </select>

        <select id="topic" onchange="updateContent()"></select>
      </div>

      <div class="section">
        <h4 id="label-assistant">BAINT AI Classroom Assistant</h4>
        <div class="card" id="explanation"></div>
        <button id="btn-speak" onclick="speak()">🎙️ BAINT Voice Explainer</button>
        <button id="btn-stop" onclick="stopVoice()">⏹ Stop Voice</button>
      </div>

      <div class="section">
        <input type="text" id="studentQuestion" placeholder="Ask BAINT AI..." />
        <button id="btn-ask" onclick="answerQuestion()">Ask</button>
        <div class="card" id="teacherReply"></div>
        <div class="reply-options" id="replyOptions" style="display:none;">
          <button onclick="applyStyle('simple')">1. Simple way</button>
          <button onclick="applyStyle('step')">2. Step-by-step</button>
          <button onclick="applyStyle('context')">3. Example</button>
        </div>
        <button id="btn-listen" onclick="speakReply()">🔊 Listen Answer</button>
      </div>

      <div class="section">
        <h4 id="label-feedback">Feedback</h4>
        <input type="text" id="feedbackInput" />
        <button id="btn-feedback" onclick="submitFeedback()">Submit</button>
        <div class="card" id="feedbackList"></div>
      </div>

      <div class="section waitlist">
        <h4 id="label-waitlist">Join BAINT Waitlist</h4>
        <input type="email" id="waitlistEmail" />
        <button id="btn-join" onclick="joinWaitlist()">Join</button>
        <div id="waitlistMessage" class="success"></div>
      </div>

    </div>
  </div>
</div>

<div class="subtitles" id="subtitles"></div>

  en: {
    biology: {
      photosynthesis: `Alright, let's talk about photosynthesis — and I promise it's simpler than it sounds.\n\nPlants are actually making their own food, right inside their leaves. Here's how it works:\n\nFirst, the leaf soaks up sunlight like a solar panel.\nThen it pulls in carbon dioxide — that's the gas we breathe out.\nMeanwhile, the roots are drinking up water from the soil.\nNow here's the magic — a green pigment called chlorophyll takes all of that and turns it into glucose, which is basically sugar the plant uses for energy.\n\nThink of it like a recipe: sunlight + water + CO2 = food for the plant.\n\nA simple way to remember it: plants eat sunlight. That's literally what they do.\n\nDoes that make sense so far? Try asking me anything you're unsure about.`,
      cell: `Okay, cells — this is one of my favourite topics because once you get it, everything in biology starts to click.\n\nEvery single living thing — you, me, a tree, a bacteria — is made of cells. They're the smallest unit of life.\n\nNow inside a cell, you've got a few key players:\n— The nucleus is like the brain. It holds your DNA and controls what the cell does.\n— The membrane is the outer wall — it decides what comes in and what stays out.\n— The cytoplasm is the jelly-like fluid that holds everything together inside.\n\nHere's a real-life example: right now, your skin is made of billions of cells. Each one is doing its job — protecting you, repairing itself, communicating with neighbours.\n\nRemember: no cells = no life. It's that fundamental.`,
      digestion: `Let's walk through what actually happens when you eat something — say, a bowl of rice.\n\nThe moment food enters your mouth, digestion has already started. Your saliva has enzymes that begin breaking things down.\n\nThen it travels down to your stomach, which is basically a powerful acid chamber. It churns and breaks the food into a thick liquid.\n\nFrom there, it moves into your small intestine — and this is where the real magic happens. Nutrients get absorbed into your bloodstream and carried to every part of your body.\n\nWhat's left over? That gets passed to the large intestine and eventually leaves the body.\n\nSo when you eat rice, your body is basically running a full factory — breaking it down, extracting the energy, and throwing out the waste.\n\nPretty efficient system, right?`,

      ratio: `A ratio is just a way of comparing two things.\n\nLet's say in a class there are 2 teachers and 10 students. The ratio of teachers to students is 2:10 — but we can simplify that to 1:5. One teacher for every five students.\n\nRatios show up everywhere — in recipes, in maps, in mixing paint, in finance.\n\nIf a recipe says mix flour and sugar in a 3:1 ratio, that means for every 3 cups of flour, you add 1 cup of sugar. Simple.\n\nTo simplify a ratio, find the biggest number that divides both sides evenly — that's called the highest common factor.\n\n2:10 → divide both by 2 → 1:5\n\nRatios are one of those things that once you see them in real life, you notice them everywhere.`

      gravity: `Let me ask you something — why does a ball fall down when you drop it, and not up?\n\nThe answer is gravity.\n\nGravity is a force — an invisible pull that every object with mass creates. The bigger the mass, the stronger the pull.\n\nEarth is massive, so its gravitational pull is strong enough to keep us on the ground, keep the moon orbiting us, and pull everything downward.\n\nIsaac Newton famously figured this out when he saw an apple fall from a tree. He asked — why does it always fall down? And that question led to one of the most important discoveries in science.\n\nOn the moon, gravity is much weaker — that's why astronauts bounce around when they walk there.\n\nGravity isn't just about falling. It's what holds our entire solar system together.`,
      energy: `Energy is one of those concepts that sounds abstract until you realise — it's literally everywhere.\n\nThe simplest definition: energy is the ability to do work. To move something, heat something, light something up.\n\nHere's what's fascinating — energy never disappears. It just changes form.\n\nWhen you eat food, chemical energy gets converted into movement energy so you can walk, run, think.\nWhen you charge your phone, electrical energy gets stored as chemical energy in the battery.\nWhen the sun shines on a solar panel, light energy becomes electrical energy.\n\nThere are many types — kinetic (movement), potential (stored), thermal (heat), electrical, chemical, nuclear.\n\nThe law of conservation of energy says energy cannot be created or destroyed — only transformed.\n\nSo every time you move, speak, or even think — you're transforming energy. Pretty remarkable.`

    history: {
      revolution: `When I say revolution, I don't just mean fighting and chaos — though that's often part of it.\n\nA revolution is what happens when a society reaches a breaking point. When enough people feel that the system is so unfair, so broken, that it has to change completely.\n\nHere's the pattern you'll see in almost every revolution:\n\nFirst, there's deep inequality or injustice — people are suffering and angry.\nThen, a spark ignites things — a bad law, a violent event, a leader who pushes too far.\nPeople organise, protest, sometimes fight.\nAnd eventually, the old power structure collapses and something new takes its place.\n\nThe French Revolution is a perfect example. The people were starving while the king lived in luxury. That tension exploded in 1789 and changed France — and honestly, the whole world — forever.\n\nRevolutions are messy, painful, and unpredictable. But they're also how history changes direction.`,
      ww1: `World War One is one of those events that starts simply and then unravels into something enormous.\n\nHere's the honest version: Europe in 1914 was like a room full of people who all hated each other and were all holding weapons.\n\nCountries had formed two big alliance systems. If one country got attacked, all its allies had to join in. It was like a chain reaction waiting to happen.\n\nThe spark? Archduke Franz Ferdinand of Austria was assassinated in Sarajevo in June 1914. Austria blamed Serbia. Russia backed Serbia. Germany backed Austria. France and Britain got pulled in.\n\nWithin weeks, most of Europe was at war.\n\nWhat followed was four years of brutal trench warfare. Millions died — soldiers and civilians alike.\n\nBy 1918 it was over, but the peace terms were so harsh on Germany that they set the stage for World War Two just twenty years later.\n\nHistory doesn't always learn from itself.`

    computer: {
      ai: `Let me explain AI the way I think about it — not with jargon, but with common sense.\n\nArtificial Intelligence is when we build systems that can do things that normally require human thinking — like recognising faces, translating languages, recommending what to watch next, or holding a conversation.\n\nBut how does it actually work?\n\nMost modern AI learns from examples. You show it millions of photos of cats, and it learns what a cat looks like. You give it billions of sentences, and it learns how language works.\n\nIt finds patterns. That's really the core of it.\n\nThe more data it gets, the better it becomes — like a student who gets smarter the more they study.\n\nAI isn't magic. It doesn't truly understand things the way humans do. But it's incredibly powerful at recognising patterns and making predictions.\n\nAnd right now, AI is changing almost every industry — medicine, education, finance, transport. We're living through one of the most significant technological shifts in human history.`,

    biology: {
      photosynthesis: `好，我们来聊聊光合作用——我保证它比听起来简单得多。\n\n植物其实是在自己制造食物，就在叶片里。过程是这样的：\n\n首先，叶片像太阳能板一样吸收阳光。\n然后它吸入二氧化碳——就是我们呼出的那种气体。\n与此同时，根部从土壤中汲取水分。\n接下来见证奇迹——一种叫叶绿素的绿色物质把这些全部转化为葡萄糖，也就是植物用来获取能量的糖分。\n\n你可以把它想成一个食谱：阳光 + 水 + 二氧化碳 = 植物的食物。\n\n最简单的记法：植物"吃"阳光。就是这样。\n\n到目前为止清楚吗？有什么不明白的地方都可以问我。`,
      cell: `细胞——这是我最喜欢的话题之一，因为一旦你理解了它，生物学的很多东西就豁然开朗了。\n\n所有生物——你、我、一棵树、一个细菌——都是由细胞构成的。细胞是生命最小的单位。\n\n细胞内部有几个关键部分：\n— 细胞核就像大脑，储存DNA，控制细胞的行为。\n— 细胞膜是外墙，决定什么进来、什么出去。\n— 细胞质是里面的胶状液体，把一切固定在一起。\n\n现实例子：此刻你的皮肤就是由数十亿个细胞构成的，每一个都在默默工作。\n\n记住：没有细胞，就没有生命。就这么重要。`,
      digestion: `我们来看看当你吃东西的时候，身体里究竟发生了什么——比如吃一碗米饭。\n\n食物一进嘴，消化就开始了。唾液里有酶，开始分解食物。\n\n然后食物进入胃——胃基本上是一个强力酸性腔室，它翻腾搅动，把食物变成浓稠的液体。\n\n接着进入小肠——这里才是真正的魔法发生的地方。营养物质被吸收进血液，输送到身体各处。\n\n剩余的东西？进入大肠，最终排出体外。\n\n所以你吃米饭的时候，身体就像在运转一座工厂——分解、提取能量、排出废物。\n\n效率相当高，对吧？`,
      genetics: `我来用我希望当初有人告诉我的方式解释遗传学。\n\n你知道为什么你可能有妈妈的眼睛或爸爸的鼻子吗？那就是遗传在起作用。\n\n你身体里几乎每个细胞都含有DNA——把它想成一本很长的说明书。DNA紧紧缠绕形成染色体。\n\nDNA上的一小段叫做基因。每个基因携带某种特征的指令——眼睛颜色、发型、身高等等。\n\n你出生时，从妈妈那里得到一半DNA，从爸爸那里得到另一半。这种组合让你成为独一无二的你。\n\n有些基因更强势，叫显性基因；较弱的叫隐性基因。这就是为什么棕色眼睛比蓝色眼睛更常见。\n\n遗传学，就是生物学把信息代代相传的方式。`
    },
    math: {
      algebra: `代数听起来难，但说实话——它就是用数字做侦探游戏。\n\n核心思想：有时候我们不知道某个值，就给它起个名字，通常叫x。\n\n比如我告诉你：x + 5 = 10。\n你在问：什么数加上5等于10？\n\n你已经知道答案是5了。你刚才就在做代数。\n\n正式做法：两边同时减去5。\nx + 5 - 5 = 10 - 5\nx = 5\n\n代数的黄金法则：你对一边做的操作，必须对另一边也做。保持平衡——就像天平一样。\n\n一旦明白这个道理，你就能解几乎所有问题。想试一道练习题吗？`,
      ratio: `比率就是比较两样东西的方式。\n\n比如班里有2位老师和10个学生。老师和学生的比率是2:10——但我们可以化简成1:5。每5个学生对应1位老师。\n\n比率到处都有——食谱、地图、调色、金融。\n\n如果食谱说面粉和糖的比率是3:1，那就是每3杯面粉加1杯糖。很简单。\n\n化简比率：找到能整除两边的最大数——这叫最大公因数。\n\n2:10 → 两边除以2 → 1:5\n\n比率就是这样，一旦在生活中发现了它，你会发现它无处不在。`
    },
    science: {
      gravity: `我问你一个问题——你扔出一个球，它为什么向下落而不是向上？\n\n答案就是重力。\n\n重力是一种力——每个有质量的物体都会产生的一种无形吸引力。质量越大，吸引力越强。\n\n地球质量巨大，所以它的引力足够强，能把我们固定在地面上，让月球围绕我们运转，并让一切向下坠落。\n\n牛顿就是看到苹果从树上落下，才想出了这个道理。他问：为什么它总是向下落？这个问题引出了科学史上最重要的发现之一。\n\n月球上的重力比地球弱得多——这就是为什么宇航员在那里走路时会蹦蹦跳跳。\n\n重力不只是关于下落，它是维系整个太阳系的力量。`,
      energy: `能量这个概念听起来很抽象，直到你意识到——它其实无处不在。\n\n最简单的定义：能量是做功的能力。移动东西、加热东西、点亮东西。\n\n有趣的是——能量永远不会消失，只会改变形式。\n\n你吃东西时，化学能转化为运动能，让你能走路、跑步、思考。\n你给手机充电时，电能储存为电池里的化学能。\n太阳照射太阳能板时，光能变成电能。\n\n能量有很多种——动能、势能、热能、电能、化学能、核能。\n\n能量守恒定律说：能量不能被创造或消灭——只能转化。\n\n所以每次你移动、说话甚至思考——你都在转化能量。相当了不起。`
    },
    history: {
      revolution: `当我说革命，我不只是说战斗和混乱——尽管这些往往都有。\n\n革命是当一个社会到达临界点时发生的事情。当足够多的人觉得这个制度太不公平、太腐烂，必须彻底改变。\n\n几乎每次革命都有这样的规律：\n\n首先，存在严重的不平等或不公正——人们在受苦、在愤怒。\n然后，一个导火索点燃了一切——一条恶法、一次暴力事件、一个走得太远的领导者。\n人们组织起来，抗议，有时战斗。\n最终，旧的权力结构崩塌，新的东西取而代之。\n\n法国大革命就是完美的例子。人民在挨饿，而国王住在豪华宫殿里。这种张力在1789年爆发，永远改变了法国——说实话，也改变了整个世界。`,
      ww1: `第一次世界大战是那种开头简单、却演变成巨大灾难的事件。\n\n真实情况是：1914年的欧洲，就像一个房间里挤满了互相憎恨、人人手持武器的人。\n\n各国形成了两大同盟体系。一个国家被攻击，它的所有盟友都必须参战。这就像一个等待触发的连锁反应。\n\n导火索？1914年6月，奥地利大公弗朗茨·斐迪南在萨拉热窝遇刺。奥地利怪罪塞尔维亚，俄国支持塞尔维亚，德国支持奥地利，法国和英国也被卷了进来。\n\n几周之内，欧洲大部分地区陷入战争。\n\n随后是四年残酷的堑壕战，数百万人死亡。\n\n1918年战争结束，但对德国的苛刻和约为二十年后的第二次世界大战埋下了种子。\n\n历史并不总能从自身中汲取教训。`
    },
    computer: {
      ai: `让我用我自己理解的方式解释人工智能——不用术语，用常识。\n\n人工智能就是我们构建能做通常需要人类思维才能完成的事情的系统——比如识别人脸、翻译语言、推荐你接下来看什么，或者进行对话。\n\n但它究竟是怎么工作的？\n\n大多数现代AI从例子中学习。你给它看几百万张猫的照片，它就学会了猫长什么样。你给它几十亿个句子，它就学会了语言的规律。\n\n它找规律。这才是核心。\n\n数据越多，它就越强——就像一个学得越多就越聪明的学生。\n\nAI不是魔法。它不像人类那样真正理解事物。但它在识别模式和做预测方面极其强大。\n\n现在，AI正在改变几乎每一个行业——医疗、教育、金融、交通。我们正在经历人类历史上最重要的技术转变之一。`,
      internet: `互联网对我们来说已经太普通了，以至于我们几乎不去想它到底是什么。\n\n真实解释：互联网是一个巨大的全球计算机网络，所有计算机连接在一起，能够即时收发信息。\n\n当你打开一个网站，你的设备向世界某处的服务器发送一个请求。那台服务器把页面发回来——整个过程在毫秒内完成。\n\n信息以数据形式传输——拆分成小包，通过电缆和卫星传送，然后在你的终端重新组合。\n\n万维网（我们通常说的"互联网"）是蒂姆·伯纳斯-李在1989年发明的。在那之前，计算机存在，但彼此无法轻易通信。\n\n今天，超过50亿人使用互联网。它改变了我们沟通、学习、购物、工作、恋爱和理解世界的方式。\n\n它可能是过去100年里最具变革性的发明。`
    }
  },
  fr: {
    biology: {
      photosynthesis: `Bien, parlons de la photosynthèse — et je te promets que c'est plus simple qu'il n'y paraît.\n\nLes plantes fabriquent leur propre nourriture, directement dans leurs feuilles. Voici comment ça fonctionne :\n\nD'abord, la feuille absorbe la lumière du soleil comme un panneau solaire.\nEnsuite, elle aspire du dioxyde de carbone — c'est le gaz que nous expirons.\nPendant ce temps, les racines absorbent l'eau du sol.\nEt voilà la magie — un pigment vert appelé chlorophylle transforme tout ça en glucose, le sucre que la plante utilise comme énergie.\n\nPense à une recette : lumière + eau + CO2 = nourriture pour la plante.\n\nLa façon la plus simple de s'en souvenir : les plantes mangent la lumière du soleil. C'est littéralement ce qu'elles font.\n\nEst-ce que c'est clair jusqu'ici ? Pose-moi toutes tes questions.`,
      cell: `Les cellules — c'est un de mes sujets préférés, parce qu'une fois que tu comprends ça, toute la biologie commence à avoir du sens.\n\nChaque être vivant — toi, moi, un arbre, une bactérie — est fait de cellules. C'est la plus petite unité de vie.\n\nÀ l'intérieur d'une cellule, il y a quelques éléments clés :\n— Le noyau, c'est comme le cerveau. Il contient ton ADN et contrôle ce que fait la cellule.\n— La membrane, c'est la paroi extérieure — elle décide ce qui entre et ce qui reste dehors.\n— Le cytoplasme, c'est le liquide gélatineux qui maintient tout ensemble à l'intérieur.\n\nExemple concret : en ce moment, ta peau est composée de milliards de cellules. Chacune fait son travail.\n\nRetiens bien : pas de cellules = pas de vie. C'est aussi fondamental que ça.`,
      digestion: `Voyons ce qui se passe vraiment quand tu manges quelque chose — disons un bol de riz.\n\nDès que la nourriture entre dans ta bouche, la digestion a déjà commencé. Ta salive contient des enzymes qui commencent à décomposer les aliments.\n\nEnsuite, ça descend dans ton estomac — qui est en gros une puissante chambre acide. Il brasse et décompose la nourriture en un liquide épais.\n\nDe là, ça passe dans l'intestin grêle — et c'est là que la vraie magie opère. Les nutriments sont absorbés dans le sang et transportés partout dans le corps.\n\nCe qui reste ? Ça passe dans le gros intestin et finit par sortir du corps.\n\nDonc quand tu manges du riz, ton corps fait tourner une vraie usine — décompose, extrait l'énergie, évacue les déchets.\n\nPlutôt efficace, non ?`,
      genetics: `Laisse-moi t'expliquer la génétique comme j'aurais aimé qu'on me l'explique.\n\nTu sais comment tu peux avoir les yeux de ta mère ou le nez de ton père ? C'est la génétique à l'œuvre.\n\nÀ l'intérieur de presque chaque cellule de ton corps se trouve l'ADN — pense à un très long manuel d'instructions. Il est enroulé en structures appelées chromosomes.\n\nDe petites sections de cet ADN s'appellent des gènes. Chaque gène porte les instructions pour un trait spécifique — couleur des yeux, type de cheveux, taille...\n\nQuand tes parents t'ont eu, tu as reçu la moitié de ton ADN de ta mère et l'autre moitié de ton père. Ce mélange fait de toi quelqu'un d'unique.\n\nCertains gènes sont plus forts — on les appelle dominants. Les plus faibles sont récessifs. C'est pourquoi les yeux marron apparaissent plus souvent que les yeux bleus.\n\nLa génétique, c'est la façon dont la biologie transmet un message de génération en génération.`
    },
    math: {
      algebra: `L'algèbre fait peur, mais honnêtement — c'est juste du travail de détective avec des chiffres.\n\nL'idée de base : parfois on ne connaît pas une valeur, alors on lui donne un nom. Habituellement on l'appelle x.\n\nDisons que je te dis : x + 5 = 10.\nTu te demandes — quel nombre, quand j'y ajoute 5, me donne 10 ?\n\nTu connais déjà la réponse : 5. Tu viens de faire de l'algèbre dans ta tête.\n\nLa méthode formelle : soustraire 5 des deux côtés.\nx + 5 - 5 = 10 - 5\nx = 5\n\nLa règle d'or de l'algèbre : ce que tu fais d'un côté, tu dois le faire de l'autre. Garde toujours l'équilibre — comme une balance.\n\nUne fois que tu as compris cette idée, tu peux résoudre presque n'importe quoi.`,
      ratio: `Un ratio, c'est simplement une façon de comparer deux choses.\n\nDisons que dans une classe il y a 2 professeurs et 10 élèves. Le ratio enseignants/élèves est 2:10 — mais on peut simplifier à 1:5. Un professeur pour cinq élèves.\n\nLes ratios sont partout — dans les recettes, les cartes, la peinture, la finance.\n\nSi une recette dit de mélanger farine et sucre dans un ratio 3:1, ça signifie : pour 3 tasses de farine, 1 tasse de sucre. Simple.\n\nPour simplifier un ratio, trouve le plus grand nombre qui divise les deux côtés — c'est le plus grand commun diviseur.\n\n2:10 → diviser par 2 → 1:5\n\nUne fois que tu les vois dans la vie réelle, tu les remarques partout.`
    },
    science: {
      gravity: `Laisse-moi te poser une question — pourquoi une balle tombe-t-elle vers le bas quand tu la lâches, et pas vers le haut ?\n\nLa réponse : la gravité.\n\nLa gravité est une force — une attraction invisible que crée tout objet ayant une masse. Plus la masse est grande, plus l'attraction est forte.\n\nLa Terre est immense, donc son attraction gravitationnelle est assez forte pour nous garder au sol, faire orbiter la Lune autour de nous, et tout tirer vers le bas.\n\nIsaac Newton a célèbrement compris ça en voyant une pomme tomber d'un arbre. Il s'est demandé — pourquoi tombe-t-elle toujours vers le bas ? Cette question a mené à l'une des découvertes les plus importantes de la science.\n\nSur la Lune, la gravité est beaucoup plus faible — c'est pourquoi les astronautes rebondissent quand ils marchent là-bas.\n\nLa gravité ne concerne pas que les chutes. C'est ce qui maintient tout notre système solaire ensemble.`,
      energy: `L'énergie est un de ces concepts qui semble abstrait jusqu'à ce que tu réalises — elle est littéralement partout.\n\nLa définition la plus simple : l'énergie est la capacité à effectuer un travail. Déplacer quelque chose, chauffer quelque chose, éclairer quelque chose.\n\nVoici ce qui est fascinant — l'énergie ne disparaît jamais. Elle change juste de forme.\n\nQuand tu manges, l'énergie chimique se transforme en énergie de mouvement pour que tu puisses marcher, courir, penser.\nQuand tu charges ton téléphone, l'énergie électrique est stockée comme énergie chimique dans la batterie.\nQuand le soleil brille sur un panneau solaire, l'énergie lumineuse devient électrique.\n\nIl y a de nombreux types — cinétique, potentielle, thermique, électrique, chimique, nucléaire.\n\nLa loi de conservation de l'énergie dit que l'énergie ne peut être ni créée ni détruite — seulement transformée.\n\nDonc chaque fois que tu bouges, parles ou même penses — tu transformes de l'énergie. Remarquable, non ?`
    },
    history: {
      revolution: `Quand je dis révolution, je ne parle pas seulement de combats et de chaos — même si ça en fait souvent partie.\n\nUne révolution, c'est ce qui se passe quand une société atteint un point de rupture. Quand assez de gens estiment que le système est tellement injuste, tellement brisé, qu'il doit changer complètement.\n\nVoici le schéma qu'on retrouve dans presque toutes les révolutions :\n\nD'abord, une profonde inégalité ou injustice — les gens souffrent et sont en colère.\nEnsuite, une étincelle déclenche tout — une mauvaise loi, un événement violent, un dirigeant qui va trop loin.\nLes gens s'organisent, protestent, parfois se battent.\nEt finalement, l'ancienne structure du pouvoir s'effondre et quelque chose de nouveau la remplace.\n\nLa Révolution française en est l'exemple parfait. Le peuple mourait de faim pendant que le roi vivait dans le luxe. Cette tension a explosé en 1789 et a changé la France — et honnêtement, le monde entier — pour toujours.`,
      ww1: `La Première Guerre mondiale est un de ces événements qui commence simplement et qui se transforme en quelque chose d'énorme.\n\nLa version honnête : l'Europe en 1914, c'était comme une pièce pleine de gens qui se détestaient tous et portaient tous des armes.\n\nLes pays avaient formé deux grands systèmes d'alliances. Si un pays était attaqué, tous ses alliés devaient entrer en guerre. C'était une réaction en chaîne qui n'attendait qu'à se déclencher.\n\nL'étincelle ? L'archiduc François-Ferdinand d'Autriche a été assassiné à Sarajevo en juin 1914. L'Autriche a accusé la Serbie. La Russie a soutenu la Serbie. L'Allemagne a soutenu l'Autriche. La France et la Grande-Bretagne ont été entraînées.\n\nEn quelques semaines, la majeure partie de l'Europe était en guerre.\n\nCe qui a suivi : quatre ans de guerre de tranchées brutale. Des millions de morts.\n\nEn 1918 c'était fini, mais les conditions de paix si dures imposées à l'Allemagne ont planté les graines de la Seconde Guerre mondiale vingt ans plus tard.`
    },
    computer: {
      ai: `Laisse-moi t'expliquer l'IA comme je la comprends — sans jargon, avec du bon sens.\n\nL'Intelligence Artificielle, c'est quand on construit des systèmes capables de faire des choses qui nécessitent normalement la pensée humaine — comme reconnaître des visages, traduire des langues, recommander quoi regarder ensuite, ou tenir une conversation.\n\nMais comment ça marche vraiment ?\n\nLa plupart des IA modernes apprennent par l'exemple. Tu lui montres des millions de photos de chats, elle apprend à quoi ressemble un chat. Tu lui donnes des milliards de phrases, elle apprend comment fonctionne le langage.\n\nElle trouve des patterns. C'est vraiment le cœur du sujet.\n\nPlus elle reçoit de données, meilleure elle devient — comme un élève qui devient plus intelligent plus il étudie.\n\nL'IA n'est pas de la magie. Elle ne comprend pas vraiment les choses comme les humains. Mais elle est incroyablement puissante pour reconnaître des patterns et faire des prédictions.`,
      internet: `Internet est tellement normal pour nous maintenant qu'on pense à peine à ce que c'est vraiment.\n\nL'explication honnête : Internet est un immense réseau mondial d'ordinateurs tous connectés ensemble, capables d'envoyer et de recevoir des informations instantanément.\n\nQuand tu ouvres un site web, ton appareil envoie une demande à un serveur quelque part dans le monde. Ce serveur renvoie la page — et toute cette conversation se passe en quelques millisecondes.\n\nL'information voyage sous forme de données — découpée en petits paquets, envoyée par câbles et satellites, puis réassemblée chez toi.\n\nLe World Wide Web a été inventé par Tim Berners-Lee en 1989. Avant ça, les ordinateurs existaient mais ne pouvaient pas facilement communiquer entre eux.\n\nAujourd'hui, plus de 5 milliards de personnes utilisent Internet. Il a changé la façon dont nous communiquons, apprenons, faisons nos achats, travaillons et comprenons le monde.`
    }
  },
  es: {
    biology: {
      photosynthesis: `Muy bien, hablemos de la fotosíntesis — y te prometo que es más sencillo de lo que parece.\n\nLas plantas fabrican su propio alimento, justo dentro de sus hojas. Así es como funciona:\n\nPrimero, la hoja absorbe la luz solar como un panel solar.\nLuego absorbe dióxido de carbono — ese es el gas que nosotros exhalamos.\nMientras tanto, las raíces beben agua del suelo.\nAhora viene la magia — un pigmento verde llamado clorofila toma todo eso y lo convierte en glucosa, que básicamente es el azúcar que la planta usa como energía.\n\nPiénsalo como una receta: luz + agua + CO2 = alimento para la planta.\n\nLa forma más fácil de recordarlo: las plantas comen luz solar. Eso es literalmente lo que hacen.\n\n¿Tiene sentido hasta aquí? Pregúntame cualquier duda que tengas.`,
      cell: `Las células — este es uno de mis temas favoritos porque una vez que lo entiendes, toda la biología empieza a tener sentido.\n\nTodo ser vivo — tú, yo, un árbol, una bacteria — está hecho de células. Son la unidad más pequeña de vida.\n\nDentro de una célula hay varios elementos clave:\n— El núcleo es como el cerebro. Contiene tu ADN y controla lo que hace la célula.\n— La membrana es la pared exterior — decide qué entra y qué se queda afuera.\n— El citoplasma es el líquido gelatinoso que mantiene todo junto en el interior.\n\nEjemplo real: ahora mismo, tu piel está formada por miles de millones de células. Cada una hace su trabajo.\n\nRecuerda: sin células = sin vida. Así de fundamental es.`,
      digestion: `Veamos qué pasa realmente cuando comes algo — digamos, un plato de arroz.\n\nEn el momento en que la comida entra a tu boca, la digestión ya ha comenzado. Tu saliva tiene enzimas que empiezan a descomponer los alimentos.\n\nLuego viaja al estómago — que básicamente es una potente cámara ácida. Agita y descompone la comida hasta convertirla en un líquido espeso.\n\nDe ahí pasa al intestino delgado — y aquí es donde ocurre la verdadera magia. Los nutrientes se absorben al torrente sanguíneo y se llevan a cada parte del cuerpo.\n\n¿Lo que queda? Pasa al intestino grueso y eventualmente sale del cuerpo.\n\nEntonces cuando comes arroz, tu cuerpo está básicamente funcionando como una fábrica completa — descompone, extrae la energía y elimina los desechos.\n\nBastante eficiente, ¿verdad?`,
      genetics: `Déjame explicarte la genética como me hubiera gustado que me la explicaran a mí.\n\nSabes cómo puedes tener los ojos de tu mamá o la nariz de tu papá. Eso es la genética en acción.\n\nDentro de casi cada célula de tu cuerpo hay ADN — piénsalo como un manual de instrucciones muy largo. Está enrollado en estructuras llamadas cromosomas.\n\nPequeñas secciones de ese ADN se llaman genes. Cada gen lleva instrucciones para un rasgo específico — color de ojos, tipo de cabello, estatura...\n\nCuando tus padres te tuvieron, recibiste la mitad de tu ADN de mamá y la otra mitad de papá. Esa combinación es lo que te hace único.\n\nAlgunos genes son más fuertes — los llamamos dominantes. Los más débiles son recesivos. Por eso los ojos marrones aparecen más que los azules.\n\nLa genética es la forma en que la biología pasa un mensaje a través de las generaciones.`
    },
    math: {
      algebra: `El álgebra suena intimidante pero honestamente — es solo trabajo de detective con números.\n\nLa idea básica: a veces no conocemos un valor, así que le damos un nombre. Normalmente lo llamamos x.\n\nDiga que te digo: x + 5 = 10.\nEstás preguntando — ¿qué número, cuando le sumo 5, me da 10?\n\nYa sabes la respuesta: 5. Acabas de hacer álgebra en tu cabeza.\n\nLa forma formal: restar 5 de ambos lados.\nx + 5 - 5 = 10 - 5\nx = 5\n\nLa regla de oro del álgebra: lo que haces de un lado, debes hacerlo del otro. Siempre mantén el equilibrio — como una balanza.\n\nUna vez que entiendes esa idea, puedes resolver casi cualquier cosa.`,
      ratio: `Una razón es simplemente una forma de comparar dos cosas.\n\nDigamos que en una clase hay 2 profesores y 10 estudiantes. La razón de profesores a estudiantes es 2:10 — pero podemos simplificar a 1:5. Un profesor por cada cinco estudiantes.\n\nLas razones aparecen en todas partes — en recetas, mapas, mezcla de pinturas, finanzas.\n\nSi una receta dice mezclar harina y azúcar en razón 3:1, significa: por cada 3 tazas de harina, 1 taza de azúcar. Simple.\n\nPara simplificar una razón, encuentra el número más grande que divide ambos lados de manera exacta — eso se llama el máximo común divisor.\n\n2:10 → dividir entre 2 → 1:5\n\nUna vez que los ves en la vida real, los encuentras en todas partes.`
    },
    science: {
      gravity: `Déjame hacerte una pregunta — ¿por qué una pelota cae hacia abajo cuando la sueltas y no hacia arriba?\n\nLa respuesta es la gravedad.\n\nLa gravedad es una fuerza — una atracción invisible que crea todo objeto con masa. A mayor masa, mayor atracción.\n\nLa Tierra es masiva, así que su atracción gravitacional es lo suficientemente fuerte para mantenernos en el suelo, mantener a la Luna orbitando y jalar todo hacia abajo.\n\nIsaac Newton descubrió esto famosamente cuando vio una manzana caer de un árbol. Se preguntó — ¿por qué siempre cae hacia abajo? Y esa pregunta llevó a uno de los descubrimientos más importantes de la ciencia.\n\nEn la Luna, la gravedad es mucho más débil — por eso los astronautas dan saltos cuando caminan allí.\n\nLa gravedad no es solo sobre caídas. Es lo que mantiene unido todo nuestro sistema solar.`,
      energy: `La energía es uno de esos conceptos que parece abstracto hasta que te das cuenta — está literalmente en todas partes.\n\nLa definición más simple: la energía es la capacidad de realizar trabajo. Mover algo, calentar algo, iluminar algo.\n\nLo fascinante es esto — la energía nunca desaparece. Solo cambia de forma.\n\nCuando comes, la energía química se convierte en energía de movimiento para que puedas caminar, correr, pensar.\nCuando cargas tu teléfono, la energía eléctrica se almacena como energía química en la batería.\nCuando el sol brilla en un panel solar, la energía lumínica se convierte en eléctrica.\n\nHay muchos tipos — cinética, potencial, térmica, eléctrica, química, nuclear.\n\nLa ley de conservación de la energía dice que la energía no puede crearse ni destruirse — solo transformarse.\n\nAsí que cada vez que te mueves, hablas o incluso piensas — estás transformando energía. Bastante notable.`
    },
    history: {
      revolution: `Cuando digo revolución, no me refiero solo a peleas y caos — aunque eso suele ser parte de ello.\n\nUna revolución es lo que pasa cuando una sociedad llega a un punto de quiebre. Cuando suficientes personas sienten que el sistema es tan injusto, tan roto, que tiene que cambiar completamente.\n\nEste es el patrón que verás en casi toda revolución:\n\nPrimero, hay una profunda desigualdad o injusticia — la gente sufre y está enojada.\nLuego, una chispa enciende todo — una mala ley, un evento violento, un líder que va demasiado lejos.\nLa gente se organiza, protesta, a veces lucha.\nY finalmente, la vieja estructura de poder colapsa y algo nuevo toma su lugar.\n\nLa Revolución Francesa es el ejemplo perfecto. El pueblo moría de hambre mientras el rey vivía en el lujo. Esa tensión explotó en 1789 y cambió Francia — y honestamente, el mundo entero — para siempre.`,
      ww1: `La Primera Guerra Mundial es uno de esos eventos que comienza simplemente y luego se convierte en algo enorme.\n\nLa versión honesta: Europa en 1914 era como una habitación llena de personas que se odiaban entre sí y todas tenían armas.\n\nLos países habían formado dos grandes sistemas de alianzas. Si un país era atacado, todos sus aliados tenían que unirse. Era como una reacción en cadena esperando a ocurrir.\n\n¿La chispa? El Archiduque Franz Ferdinand de Austria fue asesinado en Sarajevo en junio de 1914. Austria culpó a Serbia. Rusia apoyó a Serbia. Alemania apoyó a Austria. Francia y Gran Bretaña fueron arrastradas.\n\nEn pocas semanas, la mayor parte de Europa estaba en guerra.\n\nLo que siguió fueron cuatro años de brutal guerra de trincheras. Millones murieron.\n\nEn 1918 terminó, pero los términos de paz tan duros sobre Alemania plantaron las semillas de la Segunda Guerra Mundial veinte años después.`
    },
    computer: {
      ai: `Déjame explicarte la IA como yo la entiendo — sin jerga, con sentido común.\n\nLa Inteligencia Artificial es cuando construimos sistemas que pueden hacer cosas que normalmente requieren pensamiento humano — como reconocer caras, traducir idiomas, recomendar qué ver a continuación, o mantener una conversación.\n\n¿Pero cómo funciona realmente?\n\nLa mayoría de las IA modernas aprenden de ejemplos. Le muestras millones de fotos de gatos y aprende cómo se ve un gato. Le das miles de millones de oraciones y aprende cómo funciona el lenguaje.\n\nEncuentra patrones. Eso es realmente el núcleo.\n\nCuantos más datos recibe, mejor se vuelve — como un estudiante que se vuelve más inteligente cuanto más estudia.\n\nLa IA no es magia. No entiende las cosas de verdad como los humanos. Pero es increíblemente poderosa para reconocer patrones y hacer predicciones.`,
      internet: `Internet es tan normal para nosotros ahora que apenas pensamos en lo que realmente es.\n\nLa explicación honesta: Internet es una enorme red global de computadoras todas conectadas, capaces de enviar y recibir información al instante.\n\nCuando abres un sitio web, tu dispositivo envía una solicitud a un servidor en algún lugar del mundo. Ese servidor devuelve la página — y toda esa conversación ocurre en milisegundos.\n\nLa información viaja como datos — dividida en pequeños paquetes, enviada por cables y satélites, luego reensamblada en tu extremo.\n\nLa World Wide Web fue inventada por Tim Berners-Lee en 1989. Antes de eso, las computadoras existían pero no podían comunicarse fácilmente entre sí.\n\nHoy, más de 5 mil millones de personas usan Internet. Ha cambiado cómo nos comunicamos, aprendemos, compramos, trabajamos y entendemos el mundo.`
    }
  },
  th: {
    biology: {
      photosynthesis: `โอเค เรามาคุยเรื่องการสังเคราะห์แสงกัน — และฉันสัญญาว่ามันง่ายกว่าที่คิด\n\nพืชสร้างอาหารเองได้ภายในใบของมัน นี่คือวิธีการ:\n\nแรกเลย ใบดูดซับแสงอาทิตย์เหมือนแผงโซลาร์เซลล์\nจากนั้นมันดูดซับคาร์บอนไดออกไซด์ — นั่นคือก๊าซที่เราหายใจออก\nขณะเดียวกัน รากก็ดื่มน้ำจากดิน\nนี่คือเวทมนตร์ — สารสีเขียวที่เรียกว่าคลอโรฟิลล์นำทุกอย่างนั้นมาเปลี่ยนเป็นกลูโคส ซึ่งก็คือน้ำตาลที่พืชใช้เป็นพลังงาน\n\nคิดแบบนี้เลย: แสง + น้ำ + CO2 = อาหารของพืช\n\nจำง่ายๆ แบบนี้: พืช "กิน" แสงอาทิตย์ นั่นคือสิ่งที่พวกมันทำจริงๆ\n\nเข้าใจไหมจนถึงตรงนี้? ถามได้เลยถ้ายังสงสัย`,
      cell: `เซลล์ — นี่เป็นหัวข้อที่ฉันชอบมาก เพราะพอเข้าใจแล้ว ชีววิทยาทุกอย่างก็เริ่มชัดขึ้น\n\nสิ่งมีชีวิตทุกชนิด — คุณ ฉัน ต้นไม้ แบคทีเรีย — ล้วนประกอบด้วยเซลล์ เซลล์คือหน่วยเล็กที่สุดของชีวิต\n\nภายในเซลล์มีส่วนประกอบสำคัญหลายอย่าง:\n— นิวเคลียสเปรียบเหมือนสมอง มันเก็บ DNA และควบคุมว่าเซลล์จะทำอะไร\n— เยื่อหุ้มเซลล์คือกำแพงด้านนอก — มันตัดสินใจว่าอะไรเข้าได้และอะไรออกได้\n— ไซโตพลาสซึมคือของเหลวคล้ายวุ้นที่รวมทุกอย่างเข้าด้วยกัน\n\nตัวอย่างจากชีวิตจริง: ตอนนี้ผิวหนังของคุณประกอบด้วยเซลล์หลายพันล้านเซลล์ แต่ละเซลล์ทำหน้าที่ของมัน\n\nจำไว้: ไม่มีเซลล์ = ไม่มีชีวิต สำคัญขนาดนั้น`,
      digestion: `มาดูกันว่าอะไรเกิดขึ้นจริงๆ เมื่อคุณกินอะไรสักอย่าง — เช่น ข้าวสักชาม\n\nทันทีที่อาหารเข้าปาก การย่อยก็เริ่มแล้ว น้ำลายมีเอนไซม์ที่เริ่มสลายอาหาร\n\nแล้วมันก็เดินทางลงไปที่กระเพาะ — ซึ่งโดยพื้นฐานแล้วคือห้องกรดที่ทรงพลัง มันบิด คน และสลายอาหารให้กลายเป็นของเหลวข้น\n\nจากนั้นก็ผ่านไปที่ลำไส้เล็ก — นี่คือที่ที่เวทมนตร์แท้จริงเกิดขึ้น สารอาหารถูกดูดซึมเข้าสู่กระแสเลือดและถูกพาไปทุกส่วนของร่างกาย\n\nที่เหลือ? ผ่านไปที่ลำไส้ใหญ่และในที่สุดก็ออกจากร่างกาย\n\nดังนั้นเมื่อคุณกินข้าว ร่างกายของคุณก็เหมือนกับกำลังเดินเครื่องโรงงานเต็มรูปแบบ — สลาย ดึงพลังงาน และขับของเสียออก\n\nมีประสิทธิภาพมากใช่ไหม?`,
      genetics: `ให้ฉันอธิบายพันธุศาสตร์แบบที่ฉันอยากให้มีคนอธิบายให้ฉันฟังตั้งแต่ต้น\n\nคุณรู้ไหมว่าทำไมคุณอาจมีตาเหมือนแม่หรือจมูกเหมือนพ่อ? นั่นคือพันธุศาสตร์กำลังทำงาน\n\nภายในเกือบทุกเซลล์ในร่างกายของคุณมี DNA — คิดว่ามันเป็นคู่มือคำแนะนำที่ยาวมาก มันถูกพันแน่นเป็นโครงสร้างที่เรียกว่าโครโมโซม\n\nส่วนเล็กๆ ของ DNA นั้นเรียกว่ายีน ยีนแต่ละตัวมีคำสั่งสำหรับลักษณะเฉพาะ — สีตา ประเภทผม ส่วนสูง และสิ่งอื่นๆ อีกมากมาย\n\nเมื่อพ่อแม่มีลูก ลูกได้รับ DNA ครึ่งหนึ่งจากแม่และอีกครึ่งจากพ่อ การผสมผสานนั้นทำให้คุณเป็นคนที่ไม่เหมือนใคร\n\nบางยีนแข็งแกร่งกว่า — เราเรียกมันว่าเด่น บางยีนอ่อนแอกว่าเรียกว่าด้อย นั่นเป็นเหตุผลที่ตาสีน้ำตาลปรากฏบ่อยกว่าตาสีน้ำเงิน\n\nพันธุศาสตร์คือวิธีที่ชีววิทยาส่งต่อข้อมูลจากรุ่นสู่รุ่น`
    },
    math: {
      algebra: `พีชคณิตฟังดูน่ากลัว แต่พูดตรงๆ — มันแค่การทำงานสืบสวนกับตัวเลข\n\nแนวคิดพื้นฐาน: บางครั้งเราไม่รู้ค่า เลยตั้งชื่อให้มัน โดยปกติเรียกว่า x\n\nสมมติฉันบอกว่า: x + 5 = 10\nคุณกำลังถามว่า — ตัวเลขอะไร เมื่อบวก 5 แล้วได้ 10?\n\nคุณรู้คำตอบแล้ว: 5 คุณเพิ่งทำพีชคณิตในหัวของคุณ\n\nวิธีการอย่างเป็นทางการ: ลบ 5 จากทั้งสองข้าง\nx + 5 - 5 = 10 - 5\nx = 5\n\nกฎทองของพีชคณิต: สิ่งที่คุณทำกับข้างหนึ่ง คุณต้องทำกับอีกข้างด้วย รักษาสมดุลเสมอ — เหมือนตาชั่ง\n\nพอเข้าใจแนวคิดนี้แล้ว คุณแก้ปัญหาได้เกือบทุกอย่าง`,
      ratio: `อัตราส่วนก็แค่วิธีเปรียบเทียบสองสิ่ง\n\nสมมติในห้องเรียนมีครู 2 คนและนักเรียน 10 คน อัตราส่วนครูต่อนักเรียนคือ 2:10 — แต่เราลดรูปได้เป็น 1:5 ครูหนึ่งคนต่อนักเรียนห้าคน\n\nอัตราส่วนอยู่ทุกที่ — ในสูตรอาหาร แผนที่ การผสมสี การเงิน\n\nถ้าสูตรบอกว่าผสมแป้งกับน้ำตาลในอัตราส่วน 3:1 หมายความว่า: ทุกๆ 3 ถ้วยแป้ง ใส่น้ำตาล 1 ถ้วย ง่ายมาก\n\nหากต้องการลดรูปอัตราส่วน หาตัวเลขที่ใหญ่ที่สุดที่หารทั้งสองข้างได้ลงตัว — เรียกว่า ห.ร.ม.\n\n2:10 → หารทั้งสองข้างด้วย 2 → 1:5\n\nพออัตราส่วนอยู่ในชีวิตจริง คุณจะเริ่มเห็นมันอยู่ทุกที่`
    },
    science: {
      gravity: `ขอถามหน่อยนะ — ทำไมลูกบอลถึงตกลงเมื่อคุณปล่อยมัน ไม่ใช่ลอยขึ้น?\n\nคำตอบคือแรงโน้มถ่วง\n\nแรงโน้มถ่วงเป็นแรง — แรงดึงดูดที่มองไม่เห็นซึ่งวัตถุทุกชนิดที่มีมวลสร้างขึ้น ยิ่งมวลมาก แรงดึงดูดยิ่งแรง\n\nโลกมีขนาดใหญ่มาก ดังนั้นแรงโน้มถ่วงของมันแข็งแกร่งพอที่จะยึดเราไว้กับพื้น ให้ดวงจันทร์โคจรรอบเรา และดึงทุกสิ่งลงด้านล่าง\n\nไอแซก นิวตัน ค้นพบสิ่งนี้เมื่อเขาเห็นแอปเปิลร่วงจากต้นไม้ เขาถามว่า — ทำไมมันถึงตกลงเสมอ? คำถามนั้นนำไปสู่การค้นพบที่สำคัญที่สุดอย่างหนึ่งในวิทยาศาสตร์\n\nบนดวงจันทร์ แรงโน้มถ่วงอ่อนกว่ามาก — นั่นเป็นเหตุผลที่นักบินอวกาศกระโดดโลดเต้นเมื่อเดินที่นั่น\n\nแรงโน้มถ่วงไม่ใช่แค่เรื่องการตก มันคือสิ่งที่ยึดระบบสุริยะทั้งหมดของเราเข้าด้วยกัน`,
      energy: `พลังงานเป็นแนวคิดที่ฟังดูนามธรรม จนกว่าคุณจะตระหนักว่า — มันอยู่ทุกที่จริงๆ\n\nนิยามที่ง่ายที่สุด: พลังงานคือความสามารถในการทำงาน เคลื่อนย้ายสิ่งของ ให้ความร้อน หรือให้แสงสว่าง\n\nนี่คือสิ่งที่น่าสนใจ — พลังงานไม่เคยหายไป มันแค่เปลี่ยนรูปแบบ\n\nเมื่อคุณกินอาหาร พลังงานเคมีถูกแปลงเป็นพลังงานการเคลื่อนไหวเพื่อให้คุณเดิน วิ่ง คิด\nเมื่อคุณชาร์จโทรศัพท์ พลังงานไฟฟ้าถูกเก็บเป็นพลังงานเคมีในแบตเตอรี่\nเมื่อแสงอาทิตย์ส่องแผงโซลาร์เซลล์ พลังงานแสงกลายเป็นพลังงานไฟฟ้า\n\nมีหลายประเภท — จลน์ ศักย์ ความร้อน ไฟฟ้า เคมี นิวเคลียร์\n\nกฎการอนุรักษ์พลังงานบอกว่า พลังงานไม่สามารถสร้างหรือทำลายได้ — เพียงแปลงรูปเท่านั้น\n\nดังนั้นทุกครั้งที่คุณเคลื่อนไหว พูด หรือแม้แต่คิด — คุณกำลังแปลงพลังงาน น่าทึ่งมากใช่ไหม?`
    },
    history: {
      revolution: `เมื่อฉันพูดว่าการปฏิวัติ ฉันไม่ได้หมายถึงแค่การต่อสู้และความวุ่นวาย — แม้ว่านั่นมักเป็นส่วนหนึ่งของมัน\n\nการปฏิวัติคือสิ่งที่เกิดขึ้นเมื่อสังคมถึงจุดแตกหัก เมื่อคนพอมากรู้สึกว่าระบบไม่ยุติธรรมและพังทลายจนต้องเปลี่ยนแปลงอย่างสิ้นเชิง\n\nนี่คือรูปแบบที่คุณจะเห็นในเกือบทุกการปฏิวัติ:\n\nแรก มีความไม่เท่าเทียมหรือความอยุติธรรมอย่างลึกซึ้ง — ผู้คนกำลังทุกข์ทรมานและโกรธ\nจากนั้น ประกายไฟจุดประทุทุกอย่าง — กฎหมายเลวร้าย เหตุการณ์รุนแรง ผู้นำที่ผลักดันไปไกลเกินไป\nผู้คนรวมตัว ประท้วง บางครั้งก็ต่อสู้\nและในที่สุด โครงสร้างอำนาจเก่าก็พังทลายและสิ่งใหม่เข้ามาแทนที่\n\nการปฏิวัติฝรั่งเศสเป็นตัวอย่างที่ดีที่สุด ประชาชนอดอยากในขณะที่กษัตริย์ใช้ชีวิตหรูหรา ความตึงเครียดนั้นระเบิดในปี 1789 และเปลี่ยนแปลงฝรั่งเศส — และจริงๆ แล้วทั้งโลก — ตลอดไป`,
      ww1: `สงครามโลกครั้งที่หนึ่งเป็นเหตุการณ์ที่เริ่มต้นง่ายๆ แล้วก็กลายเป็นเรื่องใหญ่โต\n\nเวอร์ชันที่ตรงไปตรงมา: ยุโรปในปี 1914 เหมือนห้องที่เต็มไปด้วยคนที่เกลียดชังกันและทุกคนถืออาวุธ\n\nประเทศต่างๆ ได้ก่อตั้งระบบพันธมิตรสองระบบ ถ้าประเทศหนึ่งถูกโจมตี พันธมิตรทั้งหมดต้องเข้าร่วม มันเหมือนปฏิกิริยาลูกโซ่ที่รอการปะทุ\n\nชนวน? อาร์คดยุค ฟรานซ์ เฟอร์ดินานด์แห่งออสเตรียถูกลอบสังหารที่เมืองซาราเยโวในเดือนมิถุนายน 1914 ออสเตรียโทษเซอร์เบีย รัสเซียสนับสนุนเซอร์เบีย เยอรมนีสนับสนุนออสเตรีย ฝรั่งเศสและอังกฤษถูกดึงเข้ามา\n\nภายในไม่กี่สัปดาห์ ยุโรปส่วนใหญ่ก็อยู่ในสงคราม\n\nสี่ปีของสงครามสนามเพลาะที่โหดร้ายตามมา คนนับล้านเสียชีวิต\n\nปี 1918 สงครามสิ้นสุด แต่เงื่อนไขสันติภาพที่รุนแรงต่อเยอรมนีได้วางเมล็ดพันธุ์สำหรับสงครามโลกครั้งที่สองเพียงยี่สิบปีต่อมา`
    },
    computer: {
      ai: `ให้ฉันอธิบาย AI แบบที่ฉันคิดถึงมัน — ไม่ใช้ศัพท์เทคนิค แต่ใช้สามัญสำนึก\n\nปัญญาประดิษฐ์คือเมื่อเราสร้างระบบที่สามารถทำสิ่งที่ปกติต้องใช้การคิดของมนุษย์ — เช่น จดจำใบหน้า แปลภาษา แนะนำสิ่งที่ควรดูต่อไป หรือการสนทนา\n\nแต่มันทำงานอย่างไรจริงๆ?\n\nAI สมัยใหม่ส่วนใหญ่เรียนรู้จากตัวอย่าง คุณแสดงรูปภาพแมวหลายล้านรูปให้มัน และมันก็เรียนรู้ว่าแมวมีลักษณะอย่างไร คุณให้ประโยคหลายพันล้านประโยคกับมัน และมันก็เรียนรู้วิธีการทำงานของภาษา\n\nมันค้นหารูปแบบ นั่นคือแก่นแท้จริงๆ\n\nยิ่งได้รับข้อมูลมาก ยิ่งดีขึ้น — เหมือนนักเรียนที่ยิ่งเรียนยิ่งฉลาด\n\nAI ไม่ใช่เวทมนตร์ มันไม่เข้าใจสิ่งต่างๆ จริงๆ แบบที่มนุษย์ทำ แต่มันทรงพลังอย่างไม่น่าเชื่อในการจดจำรูปแบบและทำการพยากรณ์\n\nตอนนี้ AI กำลังเปลี่ยนแปลงเกือบทุกอุตสาหกรรม — การแพทย์ การศึกษา การเงิน การขนส่ง เรากำลังอยู่ในช่วงการเปลี่ยนแปลงทางเทคโนโลยีที่สำคัญที่สุดในประวัติศาสตร์มนุษย์`,
      internet: `อินเทอร์เน็ตกลายเป็นเรื่องปกติสำหรับเราจนเราแทบไม่คิดถึงว่ามันคืออะไรจริงๆ\n\nคำอธิบายที่ตรงไปตรงมา: อินเทอร์เน็ตเป็นเครือข่ายคอมพิวเตอร์ทั่วโลกขนาดใหญ่ที่เชื่อมต่อกัน สามารถส่งและรับข้อมูลได้ทันที\n\nเมื่อคุณเปิดเว็บไซต์ อุปกรณ์ของคุณส่งคำขอไปยังเซิร์ฟเวอร์ที่ไหนสักแห่งในโลก เซิร์ฟเวอร์นั้นส่งหน้าเว็บกลับมา — และการสนทนาทั้งหมดนี้เกิดขึ้นในเสี้ยววินาที\n\nข้อมูลเดินทางเป็นแพ็กเก็ตเล็กๆ ผ่านสายเคเบิลและดาวเทียม แล้วประกอบขึ้นใหม่ที่ปลายทางของคุณ\n\nเวิลด์ไวด์เว็บถูกประดิษฐ์โดย ทิม เบอร์เนอร์ส-ลี ในปี 1989 ก่อนนั้น คอมพิวเตอร์มีอยู่แต่ไม่สามารถสื่อสารกันได้ง่ายๆ\n\nวันนี้ มากกว่า 5 พันล้านคนใช้อินเทอร์เน็ต มันเปลี่ยนวิธีที่เราสื่อสาร เรียนรู้ ช้อปปิ้ง ทำงาน และเข้าใจโลก\n\nมันน่าจะเป็นสิ่งประดิษฐ์ที่เปลี่ยนแปลงมากที่สุดในช่วง 100 ปีที่ผ่านมา`
    }
  },
  ko: {
    biology: {
      photosynthesis: `좋아요, 광합성에 대해 이야기해 봅시다 — 약속하건대 생각보다 훨씬 간단해요.\n\n식물은 잎사귀 안에서 직접 자신의 먹이를 만들어요. 어떻게 작동하는지 보여드릴게요:\n\n먼저, 잎이 태양광 패널처럼 햇빛을 흡수해요.\n그런 다음 이산화탄소를 빨아들여요 — 우리가 내쉬는 바로 그 가스예요.\n한편, 뿌리는 흙에서 물을 빨아올리고 있어요.\n이제 마법이 일어나요 — 엽록소라는 녹색 색소가 이 모든 것을 포도당으로 바꾸는데, 이게 바로 식물이 에너지로 쓰는 당분이에요.\n\n이렇게 생각해보세요: 햇빛 + 물 + CO2 = 식물의 먹이.\n\n가장 쉽게 기억하는 법: 식물은 햇빛을 먹어요. 말 그대로 그게 그들이 하는 일이에요.\n\n여기까지 이해되나요? 궁금한 점은 뭐든 물어보세요.`,
      cell: `세포 — 이건 제가 가장 좋아하는 주제 중 하나예요. 이걸 이해하면 생물학의 모든 것이 맞아떨어지기 시작하거든요.\n\n모든 생물 — 당신, 나, 나무, 박테리아 — 은 세포로 이루어져 있어요. 세포는 생명의 가장 작은 단위예요.\n\n세포 안에는 몇 가지 핵심 요소가 있어요:\n— 핵은 뇌와 같아요. DNA를 담고 있으며 세포가 무엇을 해야 할지 제어해요.\n— 막은 외벽이에요 — 무엇이 들어오고 무엇이 나가는지 결정해요.\n— 세포질은 내부의 모든 것을 함께 유지하는 젤 같은 액체예요.\n\n실생활 예시: 지금 이 순간, 당신의 피부는 수십억 개의 세포로 이루어져 있어요. 각각이 자신의 일을 하고 있죠.\n\n기억하세요: 세포 없이는 생명도 없어요. 그만큼 근본적인 거예요.`,
      digestion: `뭔가를 먹었을 때 실제로 어떤 일이 일어나는지 살펴봅시다 — 밥 한 공기를 예로 들어볼게요.\n\n음식이 입에 들어가는 순간, 소화는 이미 시작돼요. 침에는 음식을 분해하기 시작하는 효소가 있거든요.\n\n그런 다음 위장으로 내려가요 — 위장은 기본적으로 강력한 산성 공간이에요. 음식을 휘젓고 분해해서 걸쭉한 액체로 만들어요.\n\n거기서 소장으로 이동해요 — 여기서 진짜 마법이 일어나요. 영양분이 혈류로 흡수되어 몸의 모든 부분으로 운반돼요.\n\n남은 것은? 대장을 거쳐 결국 몸 밖으로 나가요.\n\n그래서 밥을 먹으면 몸이 완전한 공장을 돌리는 거예요 — 분해하고, 에너지를 추출하고, 폐기물을 배출하는 거죠.\n\n꽤 효율적이죠?`,
      genetics: `제가 처음부터 누군가 이렇게 설명해줬으면 했던 방식으로 유전학을 설명해드릴게요.\n\n당신이 엄마의 눈이나 아빠의 코를 가질 수 있다는 걸 알죠? 그게 바로 유전학이에요.\n\n몸 속 거의 모든 세포 안에 DNA가 있어요 — 엄청 긴 사용설명서라고 생각해보세요. 그것은 염색체라는 구조로 빽빽하게 감겨 있어요.\n\nDNA의 작은 부분들을 유전자라고 해요. 각 유전자는 특정 특성에 대한 지침을 가지고 있어요 — 눈 색깔, 머리카락 종류, 키, 그리고 수천 가지 다른 것들이요.\n\n부모님이 당신을 낳았을 때, 엄마에게서 DNA의 절반을, 아빠에게서 나머지 절반을 받았어요. 그 혼합이 당신을 유일무이한 존재로 만드는 거예요.\n\n어떤 유전자는 더 강해요 — 그것을 우성이라고 해요. 더 약한 것은 열성이라고 해요. 그래서 갈색 눈이 파란 눈보다 더 자주 나타나는 거예요.\n\n유전학은 생물학이 세대를 넘어 메시지를 전달하는 방식이에요.`
    },
    math: {
      algebra: `대수학은 무섭게 들리지만 솔직히 — 그냥 숫자로 하는 탐정 놀이예요.\n\n기본 아이디어: 가끔 값을 모르니까 이름을 붙여줘요. 보통 x라고 불러요.\n\n내가 이렇게 말한다고 해봐요: x + 5 = 10.\n당신은 묻는 거예요 — 어떤 숫자에 5를 더하면 10이 될까?\n\n이미 답을 알죠: 5예요. 방금 머릿속으로 대수학을 한 거예요.\n\n공식적인 방법: 양쪽에서 5를 빼요.\nx + 5 - 5 = 10 - 5\nx = 5\n\n대수학의 황금 법칙: 한쪽에 하는 것을 다른 쪽에도 해야 해요. 항상 균형을 유지하세요 — 저울처럼요.\n\n이 아이디어를 이해하면 거의 모든 것을 풀 수 있어요.`,
      ratio: `비율은 그냥 두 가지를 비교하는 방법이에요.\n\n한 반에 선생님 2명과 학생 10명이 있다고 해봐요. 선생님 대 학생 비율은 2:10 — 하지만 이걸 1:5로 단순화할 수 있어요. 학생 다섯 명당 선생님 한 명이죠.\n\n비율은 어디에나 있어요 — 요리법, 지도, 페인트 혼합, 재정에도요.\n\n요리법이 밀가루와 설탕을 3:1 비율로 섞으라고 하면: 밀가루 3컵마다 설탕 1컵을 넣어요. 간단하죠.\n\n비율을 단순화하려면 양쪽을 나눌 수 있는 가장 큰 수를 찾으세요 — 그게 최대공약수예요.\n\n2:10 → 둘 다 2로 나누면 → 1:5\n\n실생활에서 한 번 보이기 시작하면 어디서나 보여요.`
    },
    science: {
      gravity: `한 가지 물어볼게요 — 공을 놓으면 왜 아래로 떨어지고 위로 올라가지 않을까요?\n\n답은 중력이에요.\n\n중력은 힘이에요 — 질량을 가진 모든 물체가 만드는 보이지 않는 당김이에요. 질량이 클수록 당김도 강해요.\n\n지구는 거대해서, 지구의 중력은 우리를 땅에 붙들어 놓고, 달이 우리 주위를 돌게 하고, 모든 것을 아래로 당길 만큼 강해요.\n\n아이작 뉴턴은 사과가 나무에서 떨어지는 것을 보고 이걸 깨달았어요. 그는 물었죠 — 왜 항상 아래로 떨어지는 걸까? 그 질문이 과학에서 가장 중요한 발견 중 하나로 이어졌어요.\n\n달에서는 중력이 훨씬 약해요 — 그래서 우주비행사들이 거기서 걸을 때 통통 튀는 거예요.\n\n중력은 단지 떨어지는 것에 관한 게 아니에요. 우리 태양계 전체를 하나로 묶는 것이에요.`,
      energy: `에너지는 추상적으로 들리는 개념 중 하나예요 — 그것이 문자 그대로 어디에나 있다는 걸 깨달을 때까지는요.\n\n가장 간단한 정의: 에너지는 일을 할 수 있는 능력이에요. 무언가를 움직이거나, 가열하거나, 빛을 밝히는 거죠.\n\n흥미로운 점은 이거예요 — 에너지는 절대 사라지지 않아요. 그냥 형태를 바꿀 뿐이에요.\n\n음식을 먹으면, 화학 에너지가 운동 에너지로 변환돼서 걷고, 달리고, 생각할 수 있게 해줘요.\n폰을 충전할 때, 전기 에너지가 배터리의 화학 에너지로 저장돼요.\n태양이 태양광 패널을 비출 때, 빛 에너지가 전기 에너지가 돼요.\n\n많은 종류가 있어요 — 운동, 위치, 열, 전기, 화학, 핵 에너지.\n\n에너지 보존 법칙은 에너지는 생성되거나 파괴될 수 없고 — 오직 변환될 수 있을 뿐이라고 해요.\n\n그러니 움직이거나 말하거나 심지어 생각할 때마다 — 에너지를 변환하고 있는 거예요. 정말 놀랍죠.`
    },
    history: {
      revolution: `혁명이라고 할 때, 단지 싸움과 혼란만을 의미하는 게 아니에요 — 물론 그게 종종 포함되지만요.\n\n혁명은 사회가 한계점에 도달했을 때 일어나는 거예요. 충분히 많은 사람들이 시스템이 너무 불공정하고 망가져서 완전히 바뀌어야 한다고 느낄 때요.\n\n거의 모든 혁명에서 볼 수 있는 패턴이 있어요:\n\n먼저, 깊은 불평등이나 부당함이 있어요 — 사람들이 고통받고 분노해요.\n그런 다음, 불꽃 하나가 모든 것에 불을 붙여요 — 나쁜 법, 폭력적인 사건, 너무 멀리 간 지도자.\n사람들이 조직하고, 항의하고, 때로는 싸워요.\n그리고 결국, 낡은 권력 구조가 무너지고 새로운 것이 그 자리를 차지해요.\n\n프랑스 혁명이 완벽한 예시예요. 왕이 사치스럽게 사는 동안 백성들은 굶주리고 있었어요. 그 긴장이 1789년에 폭발했고 프랑스를 — 솔직히 전 세계를 — 영원히 바꿔놓았어요.`,
      ww1: `1차 세계대전은 단순하게 시작해서 엄청난 것으로 펼쳐지는 사건 중 하나예요.\n\n솔직한 버전: 1914년의 유럽은 서로를 모두 미워하면서 모두 무기를 들고 있는 방 같았어요.\n\n나라들이 두 개의 큰 동맹 체계를 형성했어요. 한 나라가 공격받으면 모든 동맹국이 참여해야 했어요. 마치 터질 기다리는 연쇄 반응 같았죠.\n\n도화선? 오스트리아의 프란츠 페르디난트 대공이 1914년 6월 사라예보에서 암살됐어요. 오스트리아는 세르비아를 비난했어요. 러시아는 세르비아를 지원했어요. 독일은 오스트리아를 지원했어요. 프랑스와 영국이 끌려들어왔어요.\n\n몇 주 안에 유럽 대부분이 전쟁 중이었어요.\n\n그다음 4년간의 잔혹한 참호전이 이어졌어요. 수백만 명이 죽었어요.\n\n1918년에 끝났지만, 독일에 가해진 가혹한 평화 조건이 불과 20년 후 2차 세계대전의 씨앗을 심었어요.`
    },
    computer: {
      ai: `제가 생각하는 방식으로 AI를 설명할게요 — 전문 용어 없이, 상식으로요.\n\n인공지능은 보통 인간의 사고가 필요한 일을 할 수 있는 시스템을 만드는 거예요 — 얼굴 인식, 언어 번역, 다음에 볼 것 추천, 또는 대화하기 같은 것들이요.\n\n하지만 실제로 어떻게 작동할까요?\n\n대부분의 현대 AI는 예시로부터 학습해요. 수백만 장의 고양이 사진을 보여주면, 고양이가 어떻게 생겼는지 배워요. 수십억 개의 문장을 주면, 언어가 어떻게 작동하는지 배워요.\n\n패턴을 찾는 거예요. 그게 진짜 핵심이에요.\n\n데이터를 더 많이 받을수록 더 좋아져요 — 더 많이 공부할수록 더 똑똑해지는 학생처럼요.\n\nAI는 마법이 아니에요. 인간처럼 진정으로 이해하지는 못해요. 하지만 패턴을 인식하고 예측을 만드는 데는 믿을 수 없을 정도로 강력해요.`,
      internet: `인터넷은 이제 너무 당연해서 실제로 뭔지 거의 생각하지 않게 됐어요.\n\n정직한 설명: 인터넷은 모두 연결된 거대한 전 세계 컴퓨터 네트워크로, 즉시 정보를 주고받을 수 있어요.\n\n웹사이트를 열면, 기기가 세계 어딘가의 서버에 요청을 보내요. 그 서버가 페이지를 돌려보내요 — 이 모든 대화가 밀리초 안에 일어나요.\n\n정보는 데이터로 이동해요 — 작은 패킷으로 나뉘고, 케이블과 위성을 통해 전송되고, 당신 쪽에서 다시 조립돼요.\n\n월드 와이드 웹은 1989년 팀 버너스-리가 발명했어요. 그 전에는 컴퓨터가 존재했지만 쉽게 소통할 수 없었어요.\n\n오늘날 50억 명 이상이 인터넷을 사용해요. 소통하고, 배우고, 쇼핑하고, 일하고, 세상을 이해하는 방식을 바꿨어요.`
    }
  },
  vi: {
    biology: {
      photosynthesis: `Được rồi, hãy nói về quang hợp — và tôi hứa nó đơn giản hơn bạn nghĩ.\n\nCây cối thực sự tự tạo ra thức ăn của mình, ngay bên trong lá của chúng. Đây là cách nó hoạt động:\n\nĐầu tiên, lá hấp thụ ánh sáng mặt trời như một tấm pin mặt trời.\nSau đó nó hút khí carbon dioxide — đó là khí chúng ta thở ra.\nTrong khi đó, rễ đang uống nước từ đất.\nBây giờ là phép màu — một sắc tố màu xanh gọi là chất diệp lục lấy tất cả những thứ đó và biến thành glucose, về cơ bản là đường mà cây sử dụng làm năng lượng.\n\nHãy nghĩ như một công thức: ánh sáng + nước + CO2 = thức ăn cho cây.\n\nCách nhớ đơn giản nhất: cây "ăn" ánh sáng mặt trời. Đó là nghĩa đen những gì chúng làm.\n\nĐến đây có ý nghĩa chưa? Hỏi tôi bất cứ điều gì bạn chưa chắc.`,
      cell: `Tế bào — đây là một trong những chủ đề yêu thích của tôi vì một khi bạn hiểu được nó, mọi thứ trong sinh học bắt đầu có ý nghĩa.\n\nMọi sinh vật sống — bạn, tôi, một cái cây, một vi khuẩn — đều được tạo ra từ tế bào. Chúng là đơn vị sự sống nhỏ nhất.\n\nBên trong một tế bào, có một vài thành phần quan trọng:\n— Nhân giống như bộ não. Nó chứa DNA của bạn và kiểm soát những gì tế bào làm.\n— Màng là bức tường bên ngoài — nó quyết định những gì đi vào và những gì ở ngoài.\n— Tế bào chất là chất lỏng giống như thạch giữ mọi thứ lại với nhau bên trong.\n\nVí dụ thực tế: ngay lúc này, da của bạn được tạo thành từ hàng tỷ tế bào. Mỗi tế bào đang làm công việc của mình.\n\nNhớ nhé: không có tế bào = không có sự sống. Đó là điều cơ bản đến vậy.`,
      digestion: `Hãy xem những gì thực sự xảy ra khi bạn ăn gì đó — ví dụ, một bát cơm.\n\nNgay khi thức ăn vào miệng, quá trình tiêu hóa đã bắt đầu rồi. Nước bọt của bạn có enzyme bắt đầu phân giải thức ăn.\n\nSau đó nó đi xuống dạ dày — về cơ bản là một buồng axit mạnh. Nó khuấy và phân giải thức ăn thành một chất lỏng đặc.\n\nTừ đó, nó di chuyển vào ruột non — và đây là nơi phép màu thực sự xảy ra. Chất dinh dưỡng được hấp thụ vào máu và được vận chuyển đến mọi bộ phận của cơ thể.\n\nCòn lại là gì? Nó được chuyển đến ruột già và cuối cùng rời khỏi cơ thể.\n\nVậy khi bạn ăn cơm, cơ thể của bạn về cơ bản đang vận hành một nhà máy đầy đủ — phân giải, chiết xuất năng lượng và thải ra chất thải.\n\nKhá hiệu quả phải không?`,
      genetics: `Hãy để tôi giải thích di truyền học theo cách tôi ước ai đó đã giải thích cho tôi.\n\nBạn biết tại sao bạn có thể có đôi mắt của mẹ hoặc cái mũi của cha không? Đó là di truyền học đang hoạt động.\n\nBên trong hầu hết mọi tế bào trong cơ thể bạn là DNA — hãy nghĩ đó là một cuốn hướng dẫn rất dài. Nó được cuộn chặt thành các cấu trúc gọi là nhiễm sắc thể.\n\nCác phần nhỏ của DNA đó được gọi là gen. Mỗi gen mang thông tin cho một đặc điểm cụ thể — màu mắt, loại tóc, chiều cao và hàng nghìn thứ khác.\n\nKhi bố mẹ có bạn, bạn nhận được một nửa DNA từ mẹ và một nửa từ cha. Sự kết hợp đó là thứ làm cho bạn trở nên độc nhất.\n\nĐôi khi một gen mạnh hơn — chúng ta gọi đó là trội. Cái yếu hơn được gọi là lặn. Đó là lý do tại sao mắt nâu xuất hiện nhiều hơn mắt xanh.\n\nDi truyền học là cách sinh học truyền đi một thông điệp qua các thế hệ.`
    },
    math: {
      algebra: `Đại số nghe có vẻ đáng sợ nhưng thực ra — nó chỉ là công việc thám tử với các con số.\n\nÝ tưởng cơ bản: đôi khi chúng ta không biết một giá trị, vì vậy chúng ta đặt tên cho nó. Thường chúng ta gọi nó là x.\n\nGiả sử tôi nói với bạn: x + 5 = 10.\nBạn đang hỏi — số nào, khi tôi cộng 5 vào, cho tôi 10?\n\nBạn đã biết câu trả lời là 5 rồi. Bạn vừa làm đại số trong đầu.\n\nCách chính thức: trừ 5 từ cả hai phía.\nx + 5 - 5 = 10 - 5\nx = 5\n\nQuy tắc vàng của đại số: những gì bạn làm với một phía, bạn phải làm với phía kia. Luôn giữ cân bằng — như một cái cân.\n\nMột khi bạn hiểu ý tưởng đó, bạn có thể giải hầu hết mọi thứ.`,
      ratio: `Tỉ lệ chỉ là một cách so sánh hai thứ.\n\nGiả sử trong một lớp có 2 giáo viên và 10 học sinh. Tỉ lệ giáo viên trên học sinh là 2:10 — nhưng chúng ta có thể đơn giản hóa thành 1:5. Một giáo viên cho mỗi năm học sinh.\n\nTỉ lệ xuất hiện ở khắp nơi — trong công thức nấu ăn, bản đồ, pha sơn, tài chính.\n\nNếu công thức nói trộn bột mì và đường theo tỉ lệ 3:1, điều đó có nghĩa là: cứ 3 cốc bột mì, thêm 1 cốc đường. Đơn giản.\n\nĐể đơn giản hóa tỉ lệ, tìm số lớn nhất chia hết cả hai phía — đó được gọi là ước số chung lớn nhất.\n\n2:10 → chia cả hai cho 2 → 1:5\n\nMột khi bạn thấy chúng trong cuộc sống thực, bạn sẽ nhận thấy chúng ở khắp nơi.`
    },
    science: {
      gravity: `Hãy để tôi hỏi bạn điều gì đó — tại sao một quả bóng rơi xuống khi bạn thả nó, không phải đi lên?\n\nCâu trả lời là trọng lực.\n\nTrọng lực là một lực — một sức kéo vô hình mà mọi vật thể có khối lượng tạo ra. Khối lượng càng lớn, sức kéo càng mạnh.\n\nTrái Đất khổng lồ, vì vậy lực hút trọng trường của nó đủ mạnh để giữ chúng ta trên mặt đất, giữ Mặt Trăng quay quanh chúng ta và kéo mọi thứ xuống phía dưới.\n\nIsaac Newton nổi tiếng đã tìm ra điều này khi nhìn thấy một quả táo rơi từ cây. Ông hỏi — tại sao nó luôn rơi xuống? Và câu hỏi đó dẫn đến một trong những khám phá quan trọng nhất trong khoa học.\n\nTrên Mặt Trăng, trọng lực yếu hơn nhiều — đó là lý do tại sao các phi hành gia nảy khi đi bộ ở đó.\n\nTrọng lực không chỉ là về việc rơi. Đó là thứ giữ toàn bộ hệ mặt trời của chúng ta lại với nhau.`,

/* ── VOICE LANG MAP ── */
const voiceMap = { en:"en", zh:"zh", fr:"fr", es:"es", th:"th", ko:"ko", vi:"vi" };

/* ── BOOT ── */
function launchDemo(){
  appLauncher.style.display = "none";
  bootScreen.style.display  = "block";
  const lang = document.getElementById("language").value;
  const lines = ui[lang].boot;
  let i = 0;
  function run(){
    if(i < lines.length){
      bootLog.innerHTML += lines[i] + "<br>";
      i++;
      setTimeout(run, 500);
    } else {
      setTimeout(() => {
        bootScreen.style.display = "none";
        demoScreen.style.display = "block";
        switchLanguage();
      }, 500);
    }
  }
  run();
}

/* ── SWITCH LANGUAGE ── */
function switchLanguage(){
  const lang = document.getElementById("language").value;
  const t    = ui[lang];
  document.getElementById("label-setup").innerText     = t.setup;
  document.getElementById("label-assistant").innerText = t.assistant;
  document.getElementById("label-feedback").innerText  = t.feedback;
  document.getElementById("label-waitlist").innerText  = t.waitlist;
  document.getElementById("btn-speak").innerText       = t.speak;
  document.getElementById("btn-stop").innerText        = t.stop;
  document.getElementById("btn-ask").innerText         = t.ask;
  document.getElementById("btn-listen").innerText      = t.listen;
  document.getElementById("btn-feedback").innerText    = t.submit;
  document.getElementById("btn-join").innerText        = t.join;
  document.getElementById("studentQuestion").placeholder = t.placeholder;
  document.getElementById("teacherReply").innerText    = t.replyDefault;
  const modeEl = document.getElementById("mode");
  ["step","simple","logic","context","human"].forEach((v,i) => { modeEl.options[i].text = t.modes[i]; });
  const subjectEl = document.getElementById("subject");
  ["biology","history","science","math","computer"].forEach((v,i) => { subjectEl.options[i].text = t.subjects[i]; });
  updateTopics();
  updateContent();
}

/* ── TOPICS ── */
function updateTopics(){
  const lang    = document.getElementById("language").value;
  const subject = document.getElementById("subject").value;
  const topicEl = document.getElementById("topic");
  topicEl.innerHTML = "";
  const keys = Object.keys(data[lang][subject]);
  keys.forEach(k => {
    const opt = document.createElement("option");
    opt.value    = k;
    opt.innerText = k.charAt(0).toUpperCase() + k.slice(1);
    topicEl.appendChild(opt);
  });
  topicEl.value = keys[0];
}

/* ── CONTENT — NO labels, just clean text ── */
function updateContent(){
  const lang  = document.getElementById("language").value;
  const s     = document.getElementById("subject").value;
  const t     = document.getElementById("topic").value;
  const mode  = document.getElementById("mode").value;
  if(!data[lang] || !data[lang][s] || !data[lang][s][t]) return;
  const base = data[lang][s][t];

  // No mode label prefix — just the content directly
  const output = (mode === "simple") ? base.split("\n")[0] : base;
  document.getElementById("explanation").innerText = output;
}

/* ── VOICE (upgraded) ── */
let utterance;

function getBestVoice(langCode){
  const voices = speechSynthesis.getVoices();
  const prefixMap = {
    en: ["en-GB","en-AU","en-US"],
    zh: ["zh-TW","zh-HK","zh-CN"],
    fr: ["fr-FR","fr-BE","fr-CA"],
    es: ["es-ES","es-MX","es-US"],
    th: ["th-TH","th"],
    ko: ["ko-KR","ko"],
    vi: ["vi-VN","vi"]
  };
  const preferred = prefixMap[langCode] || ["en-US"];
  for(const locale of preferred){
    const match = voices.find(v => v.lang === locale);
    if(match) return match;
  }
  const fallback = voices.find(v => v.lang.toLowerCase().startsWith(langCode));
  if(fallback) return fallback;
  return voices.find(v => v.lang.startsWith("en")) || voices[0];
}

function speak(){
  stopVoice();
  const lang = document.getElementById("language").value;
  const text = document.getElementById("explanation").innerText;
  if(!text) return;
  document.getElementById("subtitles").style.display = "block";
  document.getElementById("subtitles").innerText = text;
  utterance = new SpeechSynthesisUtterance(text);
  utterance.voice  = getBestVoice(lang);
  utterance.lang   = utterance.voice ? utterance.voice.lang : lang;
  utterance.rate   = 0.92;
  utterance.pitch  = 1.05;
  utterance.volume = 1;
  utterance.onend  = () => { document.getElementById("subtitles").style.display = "none"; };
  speechSynthesis.speak(utterance);
}

function speakReply(){
  stopVoice();
  const lang = document.getElementById("language").value;
  const text = document.getElementById("teacherReply").innerText;
  if(!text) return;
  document.getElementById("subtitles").style.display = "block";
  document.getElementById("subtitles").innerText = text;
  utterance = new SpeechSynthesisUtterance(text);
  utterance.voice  = getBestVoice(lang);
  utterance.lang   = utterance.voice ? utterance.voice.lang : lang;
  utterance.rate   = 0.92;
  utterance.pitch  = 1.05;
  utterance.volume = 1;
  utterance.onend  = () => { document.getElementById("subtitles").style.display = "none"; };
  speechSynthesis.speak(utterance);
}

function stopVoice(){
  speechSynthesis.cancel();
  document.getElementById("subtitles").style.display = "none";
}

speechSynthesis.onvoiceschanged = () => { speechSynthesis.getVoices(); };

/* ── STATE DETECTION ── */
function detectUserState(input){
  const t = input.toLowerCase().trim();
  if(/don'?t understand|confused|not clear|lost|unclear|what does|what is|help/.test(t)) return "confused";
  if(/how|why|tell me more|explain more|what about|curious|interesting|deeper/.test(t)) return "curious";
  return "neutral";
}

/* ── ANSWER QUESTION — no badges, no labels ── */
function answerQuestion(){
  const lang  = document.getElementById("language").value;
  const q     = document.getElementById("studentQuestion").value.trim();
  const s     = document.getElementById("subject").value;
  const t     = document.getElementById("topic").value;
  if(!q) return;

  const base  = data[lang][s][t];
  const state = detectUserState(q);
  let reply   = "";

  // Natural teacher language — no system labels shown
  if(state === "confused"){
    reply = "No worries — let me make this really simple.\n\n"
      + base.split("\n")[0]
      + "\n\nDoes that help? Or would you like me to try a different approach?";
  }
  else if(state === "curious"){
    reply = "Great question! Let me give you a deeper look.\n\n" + base;
  }
  else {
    reply = "Let me walk you through this.\n\n" + base;
  }

  // Show reply — no badge, no Q: label
  document.getElementById("teacherReply").innerHTML = reply.replace(/\n/g,"<br>");

  // Show style options with natural prompt
  const optionsEl = document.getElementById("replyOptions");
  optionsEl.style.display = "flex";
}

/* ── APPLY STYLE — each button gives genuinely different output ── */
function applyStyle(style){
  const lang = document.getElementById("language").value;
  const s    = document.getElementById("subject").value;
  const t    = document.getElementById("topic").value;
  const base = data[lang][s][t];
  const T    = ui[lang];
  let reply  = "";

  if(style === "simple"){
    // First sentence only — stripped down
    reply = "Let's start with the simplest version.\n\n" + base.split("\n")[0];
  }
  else if(style === "step"){
    // Full explanation
    reply = "Let me go through this step by step.\n\n" + base;
  }
  else if(style === "context"){
    // Pull the example line only
    const lines = base.split("\n");
    const exLine = lines.find(l => l.toLowerCase().includes("example")) || lines[0];
    reply = "Let me explain this with a real example.\n\n" + exLine;
  }

  // Show updated reply + "Was this clearer?" follow-up in correct language
  document.getElementById("teacherReply").innerHTML =
    reply.replace(/\n/g,"<br>") +
    `<br><br><span style="color:#6b7280;font-size:13px;">${T.clarify}</span><br>
    <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;">
      <button class="followup-btn" onclick="gotIt()">${T.yes}</button>
      <button class="followup-btn alt" onclick="showOptions()">${T.tryAgain}</button>
    </div>`;
}

/* ── FOLLOW-UP ACTIONS ── */
function gotIt(){
  // Remove the follow-up — keep only the explanation text
  const el   = document.getElementById("teacherReply");
  const text = el.innerText.split(ui[document.getElementById("language").value].clarify)[0].trim();
  el.innerHTML = text.replace(/\n/g,"<br>");
  document.getElementById("replyOptions").style.display = "none";
}

function showOptions(){
  document.getElementById("replyOptions").style.display = "flex";
  document.getElementById("replyOptions").scrollIntoView({ behavior:"smooth" });
}

/* ── FEEDBACK ── */
function submitFeedback(){
  const f    = document.getElementById("feedbackInput").value;
  let list   = JSON.parse(localStorage.getItem("baint_feedback")) || [];
  list.push(f);
  localStorage.setItem("baint_feedback", JSON.stringify(list));
  document.getElementById("feedbackList").innerHTML = list.map(x => "• " + x).join("<br>");
}

/* ── WAITLIST ── */
function joinWaitlist(){
  const lang  = document.getElementById("language").value;
  const email = document.getElementById("waitlistEmail").value;
  let list    = JSON.parse(localStorage.getItem("baint_waitlist")) || [];
  list.push(email);
  localStorage.setItem("baint_waitlist", JSON.stringify(list));
  window.location.href = `mailto:baintcomputer@gmail.com?subject=BAINT Waitlist&body=New signup: ${email}`;
  document.getElementById("waitlistMessage").innerText = ui[lang].waitlistOk;
}
