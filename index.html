<head>

<style>

<body>

<div class="laptop">
  <div class="top-bar">BAINT OS — Classroom Assistant Demo</div>

  <div class="screen-shell">

    <!-- (YOUR FULL HTML UI REMAINS EXACTLY THE SAME) -->

  </div>
</div>

<script>

/* =========================
   (UNCHANGED DATA + LOGIC)
========================= */

const data = {
  biology: {
    photosynthesis: `Photosynthesis is the process plants use to make food...`,
    cell: `Cells are the basic building blocks of life...`,
    digestion: `Digestion is how food is broken down...`,
    genetics: `Genetics is how traits are passed...`
  },
  math: {
    algebra: `Algebra is solving unknown values...`,
    ratio: `Ratios compare two quantities...`
  },
  science: {
    gravity: `Gravity is a force that pulls objects down...`,
    energy: `Energy is the ability to do work...`
  },
  history: {
    revolution: `A revolution is a major change in society...`,
    ww1: `World War 1 was a global conflict...`
  },
  computer: {
    ai: `AI is machines simulating human intelligence...`,
    internet: `Internet connects computers worldwide...`
  }
};

/* =========================
   🔥 UPDATED ANSWER FUNCTION
========================= */

function answerQuestion(){
  const q = document.getElementById("studentQuestion").value;
  const s = document.getElementById("subject").value;
  const t = document.getElementById("topic").value;
  const mode = document.getElementById("mode").value;
  const lang = document.getElementById("language").value;

  let base = data[s][t];
  let reply = "";

  // 🧠 Modes
  if(mode === "step"){
    reply = "Let's solve it step-by-step:\n\n" + base;
  }
  else if(mode === "simple"){
    reply = "Simple answer:\n\n" + base.split("\n")[0];
  }
  else if(mode === "logic"){
    reply = "Logical explanation:\n\n" + base;
  }
  else if(mode === "context"){
    reply = "Real-life explanation:\n\n" + base;
  }
  else if(mode === "human"){
    reply = "Think about it like this:\n\n" + base;
  }

  // 🌍 Languages
  if(lang === "th") reply = "คำตอบ:\n\n" + reply;
  if(lang === "ko") reply = "답변:\n\n" + reply;
  if(lang === "vi") reply = "Câu trả lời:\n\n" + reply;

  document.getElementById("teacherReply").innerText =
`BAINT AI RESPONSE

Question: ${q}

${reply}`;
}

/* =========================
   🔊 UPDATED VOICE SYSTEM
========================= */

let utterance;

function getVoice(lang) {
  const voices = speechSynthesis.getVoices();
  return voices.find(v =>
    v.lang.toLowerCase().includes(lang)
  ) || voices.find(v =>
    v.lang.toLowerCase().includes("en")
  );
}

function speak(){
  stopVoice();

  const lang = document.getElementById("language").value;
  const text = document.getElementById("explanation").innerText;

  document.getElementById("subtitles").style.display = "block";
  document.getElementById("subtitles").innerText = text;

  utterance = new SpeechSynthesisUtterance(text);

  let voiceLang = "en";

  if(lang === "zh") voiceLang = "zh";
  if(lang === "fr") voiceLang = "fr";
  if(lang === "es") voiceLang = "es";
  if(lang === "th") voiceLang = "th";
  if(lang === "ko") voiceLang = "ko";
  if(lang === "vi") voiceLang = "vi";

  utterance.voice = getVoice(voiceLang);
  utterance.lang = voiceLang;

  speechSynthesis.speak(utterance);
}

function speakReply(){
  stopVoice();

  const lang = document.getElementById("language").value;
  const text = document.getElementById("teacherReply").innerText;

  document.getElementById("subtitles").style.display = "block";
  document.getElementById("subtitles").innerText = text;

  utterance = new SpeechSynthesisUtterance(text);

  let voiceLang = "en";

  if(lang === "zh") voiceLang = "zh";
  if(lang === "fr") voiceLang = "fr";
  if(lang === "es") voiceLang = "es";
  if(lang === "th") voiceLang = "th";
  if(lang === "ko") voiceLang = "ko";
  if(lang === "vi") voiceLang = "vi";

  utterance.voice = getVoice(voiceLang);
  utterance.lang = voiceLang;

  speechSynthesis.speak(utterance);
}

function stopVoice(){
  speechSynthesis.cancel();
  document.getElementById("subtitles").style.display = "none";
}

speechSynthesis.onvoiceschanged = () => {
  speechSynthesis.getVoices();
};

</script>

</body>
</html>
