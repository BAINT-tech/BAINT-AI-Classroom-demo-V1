<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BAINT OS – Classroom Assistant Demo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: #f3f3f3;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
.laptop {
  width: 960px;
  height: 650px;
  background: #000;
  border-radius: 28px;
  padding: 16px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  display: flex;
  flex-direction: column;
}
.top-bar {
  height: 36px;
  background: #1c1c1c;
  border-radius: 18px 18px 0 0;
  color: #fff;
  display: flex;
  align-items: center;
  padding: 0 16px;
  font-size: 14px;
  font-weight: bold;
}
.screen-shell {
  flex: 1;
  background: #f9fafb;
  border-radius: 0 0 28px 28px;
  margin-top: 6px;
  padding: 22px;
  overflow-y: auto;
  position: relative;
}
.section { margin-bottom: 20px; }
.section h4 { margin: 0 0 8px; font-size: 15px; }
select, input { padding: 8px 10px; border-radius: 8px; border: 1px solid #d1d5db; font-size: 14px; margin-right: 8px; }
input[type="text"], input[type="email"] { width: 60%; }
.card {
  background: #ffffff;
  border-radius: 14px;
  padding: 16px;
  border: 1px solid #e5e7eb;
  font-size: 14px;
  line-height: 1.6;
  min-height: 60px;
}
button {
  background: #2563eb;
  border: none;
  padding: 10px 18px;
  border-radius: 10px;
  color: #fff;
  cursor: pointer;
  font-size: 14px;
  margin-top: 6px;
}
button.mic { background: #10b981; margin-left: 8px; }
.waitlist {
  background: #eef2ff;
  border: 1px dashed #6366f1;
  border-radius: 14px;
  padding: 16px;
}
.success { color: #047857; font-size: 13px; margin-top: 8px; }
.subtitles {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 80%;
  background: rgba(0,0,0,0.8);
  color: #fff;
  padding: 12px;
  border-radius: 12px;
  font-size: 13px;
  display: none;
  text-align: center;
}
</style>
</head>

<body>

<div class="laptop">
  <div class="top-bar">BAINT OS — Classroom Assistant Demo</div>

  <div class="screen-shell">

    <div id="app-launcher" class="section">
      <img src="logo.png" style="width:120px;height:120px;margin-bottom:12px;">
      <h3 onclick="launchDemo()" style="cursor:pointer;">Click to Launch BAINT Classroom Demo</h3>
    </div>

    <div id="demo" style="display:none;">

      <!-- SUBJECTS -->
      <div class="section">
        <h4>Learning Subjects</h4>
        <select id="subject" onchange="updateTopics(); updateContent();">
          <option value="biology">Biology</option>
          <option value="history">History</option>
          <option value="science">Science</option>
          <option value="math">Mathematics</option>
          <option value="computer">Computer Science</option>
        </select>

        <select id="topic" onchange="updateContent()"></select>
      </div>

      <!-- EXPLANATION -->
      <div class="section">
        <h4>BAINT AI Classroom Assistant</h4>
        <div class="card" id="explanation"></div>
      </div>

      <!-- QUESTION -->
      <div class="section">
        <input type="text" id="studentQuestion" placeholder="Ask BAINT AI..." />
        <button onclick="answerQuestion()">Ask</button>
        <div class="card" id="teacherReply">BAINT AI will respond here...</div>
      </div>

      <!-- FEEDBACK -->
      <div class="section">
        <h4>Feedback</h4>
        <input type="text" id="feedbackInput" />
        <button onclick="submitFeedback()">Submit</button>
        <div class="card" id="feedbackList"></div>
      </div>

      <!-- WAITLIST -->
      <div class="section waitlist">
        <h4>Join BAINT Waitlist</h4>
        <input type="email" id="waitlistEmail" />
        <button onclick="joinWaitlist()">Join</button>
        <div id="waitlistMessage" class="success"></div>
      </div>

    </div>
  </div>
</div>

<script>

/* EXPANDED KNOWLEDGE SYSTEM */
const data = {
  biology: {
    photosynthesis: "Plants convert sunlight into glucose using chlorophyll.",
    cell: "Cell is the basic unit of life with nucleus, membrane and cytoplasm.",
    dna: "DNA carries genetic information in all living organisms."
  },

  history: {
    revolution: "French Revolution changed monarchy into democracy structure.",
    worldwar: "World War shaped modern global politics and alliances."
  },

  science: {
    gravity: "Gravity is a force that pulls objects toward Earth.",
    energy: "Energy cannot be created or destroyed, only transformed."
  },

  math: {
    algebra: "Algebra uses symbols to represent numbers in equations.",
    geometry: "Geometry studies shapes, angles and spatial relationships."
  },

  computer: {
    ai: "AI enables machines to simulate human intelligence.",
    internet: "Internet connects millions of computers globally."
  }
};

/* INIT TOPICS */
function updateTopics(){
  const subject=document.getElementById("subject").value;
  const topic=document.getElementById("topic");
  topic.innerHTML="";

  Object.keys(data[subject]).forEach(t=>{
    let opt=document.createElement("option");
    opt.value=t;
    opt.innerText=t;
    topic.appendChild(opt);
  });
}

/* CONTENT */
function updateContent(){
  const s=document.getElementById("subject").value;
  const t=document.getElementById("topic").value;
  document.getElementById("explanation").innerText =
  "BAINT AI Classroom Assistant\n\n" + data[s][t];
}

/* QUESTION */
function answerQuestion(){
  const q=document.getElementById("studentQuestion").value;
  const s=document.getElementById("subject").value;
  const t=document.getElementById("topic").value;

  document.getElementById("teacherReply").innerText =
`BAINT AI RESPONSE

Question: ${q}

Answer:
${data[s][t]}`;
}

/* FEEDBACK */
function submitFeedback(){
  const f=document.getElementById("feedbackInput").value;
  let list=JSON.parse(localStorage.getItem("baint_feedback"))||[];
  list.push(f);
  localStorage.setItem("baint_feedback",JSON.stringify(list));
  document.getElementById("feedbackList").innerHTML=list.map(x=>"• "+x).join("<br>");
}

/* WAITLIST (MAILTO FIX INCLUDED) */
function joinWaitlist(){
  const email=document.getElementById("waitlistEmail").value;

  let list=JSON.parse(localStorage.getItem("baint_waitlist"))||[];
  list.push(email);
  localStorage.setItem("baint_waitlist",JSON.stringify(list));

  window.location.href=
  `mailto:baintcomputer@gmail.com?subject=BAINT Waitlist&body=New signup: ${email}`;

  document.getElementById("waitlistMessage").innerText =
  "You're on the waitlist!";
}

/* INIT */
updateTopics();

</script>

</body>
</html>
