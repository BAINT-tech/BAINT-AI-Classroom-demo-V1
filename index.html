<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BAINT OS – Classroom Assistant Demo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: #f3f3f3;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.laptop {
  width: 960px;
  height: 650px;
  background: #000;
  border-radius: 28px;
  padding: 16px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  display: flex;
  flex-direction: column;
}

.top-bar {
  height: 36px;
  background: #1c1c1c;
  border-radius: 18px 18px 0 0;
  color: #fff;
  display: flex;
  align-items: center;
  padding: 0 16px;
  font-size: 14px;
  font-weight: bold;
}

.screen-shell {
  flex: 1;
  background: #f9fafb;
  border-radius: 0 0 28px 28px;
  margin-top: 6px;
  padding: 22px;
  overflow-y: auto;
}

.section { margin-bottom: 20px; }

.card {
  background: #fff;
  border-radius: 14px;
  padding: 16px;
  border: 1px solid #e5e7eb;
  font-size: 14px;
  line-height: 1.6;
}

button {
  background: #2563eb;
  border: none;
  padding: 10px 18px;
  border-radius: 10px;
  color: #fff;
  cursor: pointer;
}

button.mic { background: #10b981; margin-left: 8px; }
</style>
</head>

<body>

<div class="laptop">
  <div class="top-bar">BAINT OS — Classroom Assistant</div>

  <div class="screen-shell">

    <!-- CONTROLS -->
    <div class="section">
      <select id="language">
        <option value="en">English</option>
        <option value="th">Thai</option>
        <option value="ko">Korean</option>
        <option value="vi">Vietnamese</option>
      </select>

      <select id="mode">
        <option value="step">Step-by-step</option>
        <option value="simple">Simple</option>
        <option value="logic">Logical</option>
        <option value="context">Context</option>
        <option value="human">Human</option>
      </select>

      <select id="subject" onchange="updateTopics(); updateContent();">
        <option value="math">Math</option>
        <option value="science">Science</option>
        <option value="biology">Biology</option>
        <option value="history">History</option>
        <option value="computer">Computer</option>
      </select>

      <select id="topic" onchange="updateContent()"></select>
    </div>

    <!-- EXPLANATION -->
    <div class="card" id="explanation"></div>

    <button onclick="speak()">🔊 Speak</button>

    <!-- QUESTION -->
    <div class="section">
      <input type="text" id="studentQuestion" placeholder="Ask question..." style="width:70%;">
      <button onclick="answerQuestion()">Ask</button>
    </div>

    <div class="card" id="teacherReply">Answer will appear here...</div>

    <button onclick="speakReply()">🔊 Speak Answer</button>

  </div>
</div>

<script>

/* DATA */
const data = {
  math: { algebra: "Solve x + 5 = 10 → x = 5" },
  science: { energy: "Energy is the ability to do work." },
  biology: { cell: "Cells are building blocks of life." },
  history: { ww1: "World War 1 started in 1914." },
  computer: { ai: "AI is machine intelligence." }
};

/* INIT TOPICS */
function updateTopics(){
  const subject = document.getElementById("subject").value;
  const topic = document.getElementById("topic");
  topic.innerHTML = "";

  Object.keys(data[subject]).forEach(t=>{
    let opt = document.createElement("option");
    opt.value = t;
    opt.innerText = t;
    topic.appendChild(opt);
  });

  topic.value = Object.keys(data[subject])[0];
}

/* CONTENT */
function updateContent(){
  const s = document.getElementById("subject").value;
  const t = document.getElementById("topic").value;
  const mode = document.getElementById("mode").value;
  const lang = document.getElementById("language").value;

  let base = data[s][t];
  let text = "";

  if(mode==="simple") text = base;
  else if(mode==="step") text = "Step-by-step:\n" + base;
  else text = base;

  if(lang==="th") text = "คำอธิบาย:\n" + text;
  if(lang==="ko") text = "설명:\n" + text;
  if(lang==="vi") text = "Giải thích:\n" + text;

  document.getElementById("explanation").innerText = text;
}

/* VOICE */
function speak(){
  const text = document.getElementById("explanation").innerText;
  speakText(text);
}

function speakReply(){
  const text = document.getElementById("teacherReply").innerText;
  speakText(text);
}

function speakText(text){
  const lang = document.getElementById("language").value;
  const utterance = new SpeechSynthesisUtterance(text);

  let voiceLang = "en-US";
  if(lang==="th") voiceLang="th-TH";
  if(lang==="ko") voiceLang="ko-KR";
  if(lang==="vi") voiceLang="vi-VN";

  utterance.lang = voiceLang;
  speechSynthesis.speak(utterance);
}

/* QUESTION */
function answerQuestion(){
  const q = document.getElementById("studentQuestion").value;
  const s = document.getElementById("subject").value;
  const t = document.getElementById("topic").value;
  const mode = document.getElementById("mode").value;
  const lang = document.getElementById("language").value;

  let base = data[s][t] || "No data";
  let reply = "";

  if(mode==="step") reply = "Step-by-step:\n" + base;
  else if(mode==="simple") reply = "Simple:\n" + base;
  else reply = base;

  if(lang==="th") reply = "คำตอบ:\n" + reply;
  if(lang==="ko") reply = "답변:\n" + reply;
  if(lang==="vi") reply = "Câu trả lời:\n" + reply;

  document.getElementById("teacherReply").innerText =
  `BAINT AI RESPONSE\n\nQuestion: ${q}\n\n${reply}`;

  speakText(reply);
}

/* START */
updateTopics();
updateContent();

</script>

</body>
</html>
